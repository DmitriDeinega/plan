name: plan

services:
  mongo:
    image: mongo:7
    container_name: plan-mongo
    restart: unless-stopped
    volumes:
      - plan_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: plan-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    # Bind to localhost only: the host's Caddy reverse proxy reaches 127.0.0.1:2100,
    # so the port must NOT be exposed to the LAN / public interface.
    ports:
      - "127.0.0.1:2100:2100"
    env_file:
      - ../backend/app/.env
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: plan_db

volumes:
  plan_mongo_data:
