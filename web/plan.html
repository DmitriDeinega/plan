<!doctype html>
<html lang="en" style="background:#0B1220">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,interactive-widget=resizes-content" />
  <meta name="theme-color" content="#0B1220">
  <meta name="background-color" content="#0B1220">

  <title>Plan <!--ENV_SUFFIX--></title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <link rel="icon" href="/static/favicon.ico?v=1">

  <style>
    :root{
	  --bg0:#070A10;
	  --bg1:#0B1020;
	  --card: rgba(255,255,255,0.08);
	  --stroke: rgba(255,255,255,0.14);
	  --text: rgba(255,255,255,0.92);
	  --muted: rgba(255,255,255,0.68);
	  --danger:#ff4d4d;
	  --ok:#2ef2a8;
	  --shadow: 0 16px 50px rgba(0,0,0,0.45);
	  --r22: 22px;
	  --safe-bottom: env(safe-area-inset-bottom, 0px);
	  --safe-top: env(safe-area-inset-top, 0px);
	  --sticky-top: calc(64px + var(--safe-top));

	  --nav-btn-h: 44px;
	  --nav-pad-top: 6px;
	  --nav-pad-bottom: max(8px, var(--safe-bottom));
	  --nav-total-h: calc(var(--nav-btn-h) + var(--nav-pad-top) + var(--nav-pad-bottom));

	  --ok-border: rgba(46,242,168,0.78);
	  --ok-glow: rgba(46,242,168,0.22);
	  --bad-border: rgba(255,77,77,0.78);
	  --bad-glow: rgba(255,77,77,0.22);
	}

    *{ box-sizing:border-box; }

    html, body{
      height:100%;
      overflow:hidden;
    }

    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1100px 800px at 25% 20%, rgba(108,231,255,0.10), transparent 60%),
        radial-gradient(900px 700px at 85% 30%, rgba(184,140,255,0.08), transparent 60%),
        radial-gradient(900px 700px at 40% 90%, rgba(46,242,168,0.06), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      background-attachment: fixed;
      background-repeat: no-repeat;
      overflow-x:hidden;
    }
	
	/* keyboard overlay */
	body.keyboard-open .nav,
	body.keyboard-open .fabDock{
	  display: none !important;
	}
	body.keyboard-open .content{
	  padding-bottom: 8px !important;
	}

    .envSuffix{
      margin-left: 6px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .35px;
      opacity: .75;
    }

    .dayDot{
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      box-shadow: 0 0 0 2px rgba(0,0,0,0.20) inset;
    }

    .dayDot.open{
      border-color: rgba(46,242,168,0.55);
      background: rgba(46,242,168,0.90);
      box-shadow:
        0 0 0 2px rgba(46,242,168,0.16),
        0 0 18px rgba(46,242,168,0.20);
    }

    .dayDot.closed{
      border-color: rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.18);
      box-shadow: 0 0 0 2px rgba(0,0,0,0.22) inset;
      opacity: 0.55;
    }

    .shell{
	  height: 100dvh;
	  display: grid;
	  grid-template-columns: 1fr;
	  grid-template-rows: auto 1fr;
	}

    .contentScroll{
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-gutter: stable;
      position: relative;
	  min-height: 0;
    }

    .contentScroll::-webkit-scrollbar{ width: 10px; height: 10px; }
    .contentScroll::-webkit-scrollbar-track{ background: transparent; }
    .contentScroll::-webkit-scrollbar-thumb{
      background: transparent;
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    .contentScroll:hover::-webkit-scrollbar-track{
      background: rgba(255,255,255,0.03);
      border-radius: 999px;
    }
    .contentScroll:hover::-webkit-scrollbar-thumb{
      background: rgba(108,231,255,0.16);
    }
    .contentScroll:hover::-webkit-scrollbar-thumb:hover{
      background: rgba(184,140,255,0.22);
    }

    .contentScroll{
      scrollbar-width: thin;
      scrollbar-color: rgba(108,231,255,0.16) transparent;
    }

    .topbar{
      position: sticky;
      top:0;
      z-index:20;
      padding: calc(10px + var(--safe-top)) 12px 10px;
      backdrop-filter: blur(14px);
      background: rgba(7,10,16,0.55);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .topbarInner{
      max-width: 1180px;
      margin:0 auto;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
    }
    .brand{
      display:flex;
      gap:10px;
      align-items:center;
      user-select:none;
      cursor:pointer;
      min-width: 160px;
    }
    .logo{
      width:36px;height:36px;
      border-radius: 12px;
      background:
        radial-gradient(18px 18px at 30% 30%, rgba(108,231,255,0.7), transparent 60%),
        radial-gradient(20px 20px at 70% 70%, rgba(184,140,255,0.65), transparent 60%),
        rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.16);
      box-shadow: 0 16px 50px rgba(0,0,0,0.45);
    }
    .brandTitle{
      display:flex;
      flex-direction:column;
      line-height:1.05;
    }
    .brandTitle .t1{ font-weight:800; letter-spacing:0.2px; }
    .brandTitle .t2{ font-size:12px; color:var(--muted); }

	.content{
	  max-width: 1180px;
	  margin: 0 auto;
	  width: 100%;
	  padding: 14px 12px calc(var(--nav-total-h) + 14px);
	}

    .toastWrap{
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 80;
      display:flex;
      flex-direction:column;
      gap:10px;
      pointer-events:none;
      width: min(680px, calc(100% - 24px));
    }
    .toast{
      pointer-events:none;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 12px 14px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,0.14);
      box-shadow: 0 16px 50px rgba(0,0,0,0.45);
      opacity:0;
      transform: translateY(-10px);
      transition: opacity .2s ease, transform .2s ease;
    }
    .toast.show{ opacity:1; transform: translateY(0); }
    .toast.ok{ background: rgba(46,242,168,0.12); }
    .toast.err{ background: rgba(255,77,77,0.12); }
    .toast span{ color: var(--text); font-weight: 900; }

    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .card{
      border-radius: 22px;
      background: rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      box-shadow: 0 16px 50px rgba(0,0,0,0.45);
      overflow:hidden;
    }
    .card.dayCard{ overflow: visible; }

    .cardHeader{
      padding: 14px 14px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      border-radius: 24px 24px 0 0;
    }
    .cardHeader h2{
      margin:0;
      font-size: 14px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.68);
    }
    .cardBody{ padding: 12px 14px 14px; }

    .hr{ height:1px; background: rgba(255,255,255,0.08); margin: 0 0 6px; }

    .iconBtn{
      width:40px;height:40px;
      border-radius: 10px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      cursor:pointer;
      display:grid;
      place-items:center;
      user-select:none;
      transition: transform 0.08s ease, background 0.2s ease;
      flex: 0 0 auto;
      font-size: 15px;
    }
    .iconBtn:active{ transform: scale(0.98); }
    .iconBtn[disabled]{ opacity:0.35; cursor:not-allowed; }

    .bubble{
      display:flex;
      align-items:center;
      gap:8px;
      padding: 6px 10px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.10);
      white-space:nowrap;
      flex: 0 0 auto;
    }

    #weightBubble{
      justify-content: center;
      align-items: center;
    }

    .dateBubble{
      min-width: 0;
      justify-content:center;
    }
    .dateInput{
      width: 100px;
      min-width: 0;
      height: 40px;
      border-radius: 10px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      padding: 0 8px;
      outline:none;
      font: inherit;
      font-weight: 950;
      font-size: 13px;
      text-align:center;
      cursor:pointer;
      user-select:none;
    }

    .weightTitle{ display:flex; align-items:center; gap:2px; }
    .weightTitle .t1{ font-weight: 950; letter-spacing: .2px; white-space:nowrap; font-size: 12px; }
    .weightInputWrap{ display:flex; align-items:center; gap:6px; }
    .weightInput{
      width: 52px;
      height: 40px;
      border-radius: 10px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      padding: 0 4px;
      outline:none;
      font: inherit;
      font-weight: 950;
      font-size: 12px;
      text-align:center;
      font-variant-numeric: tabular-nums;
      /* suppress the native ✕ button that type=search adds in Chrome */
      -webkit-appearance: none;
      appearance: none;
    }
    .weightInput::-webkit-search-cancel-button,
    .weightInput::-webkit-search-decoration,
    .weightInput::-webkit-search-results-button,
    .weightInput::-webkit-search-results-decoration {
      display: none;
      -webkit-appearance: none;
    }
    .weightUnit{ color: rgba(255,255,255,0.68); font-weight: 800; user-select:none; white-space:nowrap; font-size: 13px; }

    .mealCard{
      border-radius: 22px;
      background: rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.10);
      overflow:hidden;
    }

    .mealBodyDay, .mealBodyFoods{
      overflow: hidden;
      max-height: 2000px;
      transition: max-height 0.28s ease, opacity 0.2s ease;
      opacity: 1;
    }

    .mealBodyFoods .foodsInner{
      max-height: 520px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    .mealCard.collapsed .mealBodyDay,
    .mealCard.collapsed .mealBodyFoods{
      max-height: 0;
      opacity: 0;
    }
    .mealCard.collapsed .mealTop{
      border-bottom: none;
    }
    .mealTop{
      padding: 12px 12px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      cursor:pointer;
    }
    .mealTop:hover{ background: rgba(255,255,255,0.05); }
    .mealName{ font-weight: 950; font-size: 16px; letter-spacing: .2px; }

    .mealTopRight{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .signBtn{
      width:36px;
      height:36px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      cursor:pointer;
      display:grid;
      place-items:center;
      user-select:none;
      transition: transform 0.08s ease, background 0.2s ease, border-color 0.2s ease;
      font-weight: 980;
      line-height: 1;
      flex: 0 0 auto;
    }
    .signBtn:active{ transform: scale(0.98); }
    .signBtn[disabled]{ opacity:0.45; cursor:not-allowed; }

    .signBtn.signed{
      border-color: rgba(46,242,168,0.45);
      background: rgba(46,242,168,0.14);
    }
    .signBtn.derived{
      border-color: rgba(108,231,255,0.35);
      background: rgba(108,231,255,0.10);
      opacity: 0.7;
      cursor:not-allowed;
    }

    .collapseBtn{
      width:36px;
      height:36px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      cursor:pointer;
      display:grid;
      place-items:center;
      user-select:none;
      transition: transform .18s ease, background .2s ease;
      font-weight: 980;
      line-height: 1;
      flex: 0 0 auto;
    }
    .collapseBtn:active{ transform: scale(0.98); }

    .chartCard{
      border-radius: 22px;
      background: rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.10);
      overflow:hidden;
      padding: 12px;
    }

    .table{ width:100%; border-collapse: collapse; }
    .table th, .table td{
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 10px 10px;
      font-size: 11px;
      text-align:left;
	  text-transform: uppercase;
    }
    .table th{
      color: rgba(255,255,255,0.68);
      font-weight: 900;
      letter-spacing: .2px;
      text-transform: uppercase;
      font-size: 11px;
      background: rgba(255,255,255,0.02);
      position: sticky;
      top: 0;
      z-index: 2;
      backdrop-filter: blur(8px);
    }
    .table th.num, .table td.num{ text-align:left; font-variant-numeric: tabular-nums; }

    .table td .cellInput{
      width:100%;
      height: 40px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.92);
      padding: 0 10px;
      outline:none;
      font: inherit;
      font-weight: 900;
      cursor: text;
    }
    .table td .cellInput[disabled]{ opacity:0.6; cursor:not-allowed; }
    .table td .cellInput:focus{
      border-color: rgba(108,231,255,0.35);
      box-shadow: 0 0 0 1px rgba(108,231,255,0.12);
    }

    .sumRow td{
      font-weight: 950;
      color: rgba(255,255,255,0.92);
      background: rgba(255,255,255,0.03);
    }

    .summaryStack{ display:flex; flex-direction:column; gap:10px; padding-top: 12px; }

    /* Settings view layout */
    .settingsGrid{
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .metric{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
    }
    .metricTitle{
      margin: 0;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .35px;
      color: rgba(255,255,255,0.55);
    }
    .metricValue{
      margin: 0;
      font-size: 14px;
      font-weight: 980;
      color: rgba(255,255,255,0.92);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 850px){
      .settingsGrid{
        grid-template-columns: 1fr;
      }
    }

    .view{ display:none; }
    .view.active{ display:block; }

    .nav{
	  position: fixed;
	  left: 0;
	  right: 0;
	  bottom: 0;
	  z-index: 30;
	  background: rgba(7,10,16,0.58);
	  backdrop-filter: blur(14px);
	  border-top: 1px solid rgba(255,255,255,0.10);
	  padding: var(--nav-pad-top) 8px var(--nav-pad-bottom);
	  box-sizing: border-box;
	}
    .navInner{
	  max-width: 1180px;
	  margin: 0 auto;
	  display: flex;
	  justify-content: space-between;
	  align-items: stretch;
	  gap: 10px;
	  height: var(--nav-btn-h);
	}
    .navBtn{
	  flex: 1;
	  height: 100%;
	  min-height: 0;
	  border-radius: 16px;
	  border: 1px solid rgba(255,255,255,0.12);
	  background: rgba(255,255,255,0.06);
	  color: rgba(255,255,255,0.68);
	  cursor: pointer;
	  font: inherit;
	  font-weight: 950;
	  letter-spacing: .2px;
	  transition: background .2s ease, color .2s ease, transform .08s ease;
	}
    .navBtn:active{ transform: scale(0.99); }
    .navBtn.active{
      color: rgba(0,0,0,0.90);
      border-color: rgba(108,231,255,0.30);
      background: linear-gradient(135deg, rgba(108,231,255,0.95), rgba(184,140,255,0.90));
    }

    .hidden{ display:none !important; }

    .errorCard{
      border-radius: 22px;
      background: rgba(255,77,77,0.10);
      border: 1px solid rgba(255,77,77,0.35);
      box-shadow: 0 16px 50px rgba(0,0,0,0.45);
      overflow: hidden;
    }
    .errorHead{
      padding: 14px 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
    }
    .errorHead .t{
      margin:0;
      font-size: 14px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      font-weight: 950;
    }
    .errorBody{
      height: 250px;
      padding: 12px 14px 14px;
      display:flex;
      flex-direction:column;
      gap: 10px;
    }
    .errorMsg{
      color: rgba(255,255,255,0.92);
      font-weight: 900;
      line-height: 1.35;
      white-space: pre-wrap;
    }
    .retryBtn{
      width: 100%;
      height: 46px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      cursor: pointer;
      font: inherit;
      font-weight: 950;
      letter-spacing: .2px;
      margin-top: auto;
      margin-bottom: 2px;
    }
    .retryBtn:active{ transform: scale(0.99); }

    .stickyPanel{
      position: sticky;
      top: 0;
      z-index: 15;
      background: rgba(11,16,32,0.86);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 22px;
      padding: 12px;
      box-shadow: 0 16px 50px rgba(0,0,0,0.45);
      margin-bottom: 12px;
      transition: border-radius .1s ease, box-shadow .1s ease, background .1s ease, border-color .1s ease;
      will-change: border-radius;
    }

    .stickyPanel.is-stuck{
      border-top-left-radius: 0;
      border-top-right-radius: 0;
      border-top-color: transparent;
    }

    .stickyPanel.noTrans{
      transition: none !important;
    }

    .dayHeaderRow{
      display:flex;
      align-items:stretch;
      gap:10px;
      flex-wrap:nowrap;
      overflow-x:auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      height: 116px;
    }
    .dayHeaderRow::-webkit-scrollbar{ display:none; }

    .dayHeaderLeft{ display:flex; flex-direction:column; align-items:stretch; justify-content:space-between; gap:6px; flex: 0 0 auto; }
    .dayHeaderRight{
      display:flex;
      align-items:stretch;
      gap:10px;
      margin-left:auto;
      flex: 0 0 auto;
      justify-content:flex-end;
    }

    /* Pivoted summary table */
    .sumTable{
      width: 340px;
      flex: 0 0 340px;
      padding: 10px 14px;
      border-radius: 22px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 12px 36px rgba(0,0,0,0.30);
      white-space: nowrap;
    }
    .sumGrid{
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
      table-layout: fixed;
      width: 100%;
    }
    .sumGrid col.sumGrid-col-label{ width: auto; }
    .sumGrid col.sumGrid-col-daily { width: 88px; }
    .sumGrid col.sumGrid-col-needed{ width: 74px; }
    .sumGrid col.sumGrid-col-left  { width: 98px; }
    .sumGrid thead th.sumTh{
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .45px;
      color: rgba(255,255,255,0.55);
      padding: 0 10px 6px 20px;
      text-align: center;
    }
    .sumGrid .sumRowLabel{
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .35px;
      color: rgba(255,255,255,0.60);
      padding: 4px 10px 4px 0;
      text-align: left;
    }
    .sumGrid .sumVal{
      font-size: 14px;
      font-weight: 980;
      color: rgba(255,255,255,0.92);
      padding: 4px 10px 4px 20px;
      text-align: center;
    }
    .sumGrid .sumValLeft{
      color: rgba(255,255,255,0.92);
    }
    .sumGrid tr.ok .sumValLeft{ color: var(--ok); }
    .sumGrid tr.bad .sumValLeft{ color: var(--danger); }

  <script>
    const APP_BASE_PATH = "<!--APP_BASE_PATH-->";

    const $ = (q, el=document) => el.querySelector(q);
    const $$ = (q, el=document) => Array.from(el.querySelectorAll(q));

    let activeViewName = "Day";

    function toast(kind, msg){
      const wrap = $("#toastWrap");
      const div = document.createElement("div");
      div.className = `toast ${kind}`;
      div.innerHTML = `<span>${escapeHtml(msg)}</span>`;
      wrap.appendChild(div);
      requestAnimationFrame(() => div.classList.add("show"));
      setTimeout(() => {
        div.classList.remove("show");
        setTimeout(() => div.remove(), 250);
      }, 2400);
    }

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[m]));
    }

    function round2(n){
      return Math.round((n + Number.EPSILON) * 100) / 100;
    }

    function ddmmyyyyFromDateObj(d){
      const dd = String(d.getDate()).padStart(2,"0");
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const yyyy = String(d.getFullYear());
      return `${dd}${mm}${yyyy}`;
    }

    function dateInputFromDdmmyyyy(ddmmyyyy){
      const d = ddmmyyyy.slice(0,2);
      const m = ddmmyyyy.slice(2,4);
      const y = ddmmyyyy.slice(4,8);
      return `${d}/${m}/${y}`;
    }

    function parseDdmmyyyy(ddmmyyyy){
      const d = Number(ddmmyyyy.slice(0,2));
      const m = Number(ddmmyyyy.slice(2,4)) - 1;
      const y = Number(ddmmyyyy.slice(4,8));
      return new Date(y,m,d);
    }

    function todayDdmmyyyy(){
      const d = new Date();
      const dd = String(d.getDate()).padStart(2,"0");
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const yyyy = String(d.getFullYear());
      return `${dd}${mm}${yyyy}`;
    }

    function tomorrowDdmmyyyy(){
      const d = new Date();
      d.setDate(d.getDate() + 1);
      const dd = String(d.getDate()).padStart(2,"0");
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const yyyy = String(d.getFullYear());
      return `${dd}${mm}${yyyy}`;
    }

    function viewIds(viewName){
      return { ok: `#${viewName}Ok`, err: `#${viewName}Err` };
    }

    function clearViewError(viewName){
      const ids = viewIds(viewName);
      const ok = $(ids.ok);
      const err = $(ids.err);
      if (err){
        err.classList.add("hidden");
        err.innerHTML = "";
      }
      if (ok) ok.classList.remove("hidden");
    }

    function showViewError(viewName, title, msg, retryFn){
      const ids = viewIds(viewName);
      const ok = $(ids.ok);
      const err = $(ids.err);

      if (ok) ok.classList.add("hidden");
      if (!err) return;

      err.classList.remove("hidden");
      err.innerHTML = `
        <div class="grid">
          <div class="errorCard">
            <div class="errorHead">
              <div class="t">${escapeHtml(title || "Error")}</div>
            </div>
            <div class="errorBody">
              <div class="errorMsg">${escapeHtml(msg || "Failed")}</div>
              <button class="retryBtn" type="button" id="${viewName}RetryBtn">Retry</button>
            </div>
          </div>
        </div>
      `;

      const btn = $(`#${viewName}RetryBtn`);
      if (btn){
        btn.onclick = null;
        btn.onclick = () => retryFn && retryFn();
      }
    }

    function showErrorOnActiveView(title, msg, retryFn){
      showViewError(activeViewName, title, msg, retryFn);
    }

    function withTimeout(ms){
      const c = new AbortController();
      const t = setTimeout(() => c.abort(new Error("Request timeout")), ms);
      return { signal: c.signal, cancel: () => clearTimeout(t) };
    }

    async function fetchJson(path, { method="GET", body=null, timeoutMs=12000, signal=null } = {}){
      const t = withTimeout(timeoutMs);

      let mergedSignal = t.signal;
      if (signal){
        const ctrl = new AbortController();
        const onAbort = () => ctrl.abort(signal.reason || new Error("Aborted"));
        signal.addEventListener("abort", onAbort, { once:true });
        t.signal.addEventListener("abort", () => ctrl.abort(t.signal.reason), { once:true });
        mergedSignal = ctrl.signal;
      }

      try{
        const r = await fetch(APP_BASE_PATH + path, {
          method,
          headers:{ "Content-Type":"application/json" },
          body: body ? JSON.stringify(body) : null,
          signal: mergedSignal
        });

        const text = await r.text();
        let json = null;
        try { json = text ? JSON.parse(text) : null; }
        catch { throw new Error("Bad JSON from server"); }

        if (!r.ok){
          const msg = (json && json.errorMessage) ? json.errorMessage : `HTTP ${r.status}`;
          throw new Error(msg);
        }

        if (!json || typeof json !== "object"){
          throw new Error("Empty response from server");
        }

        if ("status" in json && json.status !== "SUCCESS"){
          throw new Error(json.errorMessage || "Server returned failure");
        }

        return json;
      } finally {
        t.cancel();
      }
    }

    async function apiGet(path){ return await fetchJson(path, { method:"GET" }); }
    async function apiPost(path, body){ return await fetchJson(path, { method:"POST", body }); }
    async function apiPut(path, body){ return await fetchJson(path, { method:"PUT", body }); }
    async function apiPatch(path, body){ return await fetchJson(path, { method:"PATCH", body }); }

    let foodsMap = {};
    let foodsCombo = [];
    let fruitsCombo = [];
    let nutsCombo = [];
    let vegetablesCombo = [];

    let groups = {};
    let settings = null;

    let startDateDdmmyyyy = "";
    let startDateObj = null;
    let openDayObj = null;

    let currentDayDdmmyyyy = "";
    let currentDayDayClosed = false;

    let currentDayTemplate = null;

    let mealClosedState = {};

    let chartDaily = null;
    let chartWeeklyAvg = null;
    let chartWeeklyRed = null;

    let fp = null;
    let mealUiState = { date: "", collapsed: {} };

    let _stickyScrollBound = false;

    let dayLoadSeq = 0;
    let dayLoadAbort = null;

    function forceResponsiveReflow(){
      requestAnimationFrame(() => {
        if (fp && fp.redraw) fp.redraw();
        if (chartDaily) chartDaily.resize();
        if (chartWeeklyAvg) chartWeeklyAvg.resize();
        if (chartWeeklyRed) chartWeeklyRed.resize();
      });
    }

    function validateDayShape(day){
      if (!day || typeof day !== "object") throw new Error("Invalid day payload");
      if (!Array.isArray(day.meals)) throw new Error("Invalid meals payload");
      return true;
    }

    const ac = {
      menu: null,
      list: null,
      sb: null, sbThumb: null, sbTrack: null,
      input: null,
      items: [],
      activeIndex: -1,
      lastRenderKey: "",
      closeTimer: null,
      ignoreMouseEnter: false
    };

    function acInit(){
      ac.menu = $("#acMenu");

      // Close on click/touch outside
      document.addEventListener("mousedown", (e) => {
        if (!ac.menu || !ac.menu.classList.contains("open")) return;
        if (ac.menu.contains(e.target)) return;
        if (ac.input && ac.input === e.target) return;
        acHide();
      });

      document.addEventListener("touchstart", (e) => {
        if (!ac.menu || !ac.menu.classList.contains("open")) return;
        if (ac.menu.contains(e.target)) return;
        if (ac.input && ac.input === e.target) return;
        acHide();
      }, { passive: true });

      // Reposition on any scroll — capture phase catches all scrollable containers
      document.addEventListener("scroll", () => {
        acReposition();
      }, { passive: true, capture: true });

      // Also listen directly on the inner scroll container
      const scroller = document.getElementById("contentScroll");
      if (scroller){
        scroller.addEventListener("scroll", () => {
          acReposition();
        }, { passive: true });
      }

      window.addEventListener("resize", () => {
        acReposition();
      });

      // Custom scrollbar wiring
      ac.list = $("#acMenuList");
      ac.sb = $("#acScrollbar");
      ac.sbThumb = $("#acSbThumb");
      ac.sbTrack = $("#acSbTrack");

      $("#acSbUp").addEventListener("mousedown", (e) => { e.preventDefault(); ac.list.scrollBy({ top: -36 }); acSbSync(); });
      $("#acSbDown").addEventListener("mousedown", (e) => { e.preventDefault(); ac.list.scrollBy({ top: 36 }); acSbSync(); });
      $("#acSbUp").addEventListener("touchstart", (e) => { e.preventDefault(); ac.list.scrollBy({ top: -36 }); acSbSync(); }, { passive: false });
      $("#acSbDown").addEventListener("touchstart", (e) => { e.preventDefault(); ac.list.scrollBy({ top: 36 }); acSbSync(); }, { passive: false });

      ac.list.addEventListener("scroll", () => acSbSync(), { passive: true });

      // Thumb drag
      let sbDragStartY = 0, sbDragStartScroll = 0;
      function sbDragMove(e){
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const dy = clientY - sbDragStartY;
        const trackH = ac.sbTrack.clientHeight;
        const thumbH = ac.sbThumb.offsetHeight;
        const scrollable = ac.list.scrollHeight - ac.list.clientHeight;
        const ratio = scrollable / Math.max(1, trackH - thumbH);
        ac.list.scrollTop = sbDragStartScroll + dy * ratio;
        acSbSync();
      }
      function sbDragEnd(){
        ac.sbThumb.classList.remove("dragging");
        document.removeEventListener("mousemove", sbDragMove);
        document.removeEventListener("mouseup", sbDragEnd);
        document.removeEventListener("touchmove", sbDragMove);
        document.removeEventListener("touchend", sbDragEnd);
      }
      ac.sbThumb.addEventListener("mousedown", (e) => {
        e.preventDefault();
        sbDragStartY = e.clientY;
        sbDragStartScroll = ac.list.scrollTop;
        ac.sbThumb.classList.add("dragging");
        document.addEventListener("mousemove", sbDragMove);
        document.addEventListener("mouseup", sbDragEnd);
      });
      ac.sbThumb.addEventListener("touchstart", (e) => {
        sbDragStartY = e.touches[0].clientY;
        sbDragStartScroll = ac.list.scrollTop;
        ac.sbThumb.classList.add("dragging");
        document.addEventListener("touchmove", sbDragMove, { passive: true });
        document.addEventListener("touchend", sbDragEnd);
      }, { passive: true });

      // Track click (jump to position)
      ac.sbTrack.addEventListener("mousedown", (e) => {
        if (e.target === ac.sbThumb) return;
        const rect = ac.sbTrack.getBoundingClientRect();
        const ratio = (e.clientY - rect.top) / rect.height;
        ac.list.scrollTop = ratio * (ac.list.scrollHeight - ac.list.clientHeight);
        acSbSync();
      });
    }

    function acGetOptions(kind){
      if (kind === "FRUITS") return fruitsCombo;
      if (kind === "NUTS") return nutsCombo;
      if (kind === "VEGETABLES") return vegetablesCombo;
      return foodsCombo;
    }

    function acShowFor(input, kind, filterText){
      if (!ac.menu) return;

      clearTimeout(ac.closeTimer);
      ac.closeTimer = null;

      const switchingInput = ac.input !== input;
      ac.input = input;

      const all = acGetOptions(kind);
      const q = String(filterText || "").trim().toUpperCase();

      let items = all;
      if (q){
        items = all.filter(x => String(x).toUpperCase().includes(q));
      }

      items = items.slice(0, 200);

      if (switchingInput) ac.list.scrollTop = 0;

      const key = kind + "|" + q + "|" + items.length;
      if (key !== ac.lastRenderKey){
        ac.lastRenderKey = key;
        ac.items = items;

        ac.list.innerHTML = items.length
          ? items.map((t, i) => `<div class="acItem" data-i="${i}">${escapeHtml(t)}</div>`).join("")
          : `<div class="acItem" style="opacity:.65; cursor:default;">No matches</div>`;

        $$(".acItem[data-i]", ac.list).forEach(el => {
          // Desktop: hover to highlight — ignore until mouse actually moves
          el.addEventListener("mouseenter", () => { if (!ac.ignoreMouseEnter) acSetActive(Number(el.dataset.i)); });

          // Desktop: mousedown picks (before blur fires)
          el.addEventListener("mousedown", (e) => {
            e.preventDefault();
            e.stopPropagation();
            acPick(Number(el.dataset.i));
          });

          // Mobile: touchend picks — only if the finger didn't scroll
          el.addEventListener("touchstart", (e) => {
            el._touchStartY = e.touches[0].clientY;
            el._touchStartX = e.touches[0].clientX;
          }, { passive: true });

          el.addEventListener("touchend", (e) => {
            const dy = Math.abs(e.changedTouches[0].clientY - (el._touchStartY || 0));
            const dx = Math.abs(e.changedTouches[0].clientX - (el._touchStartX || 0));
            if (dy > 8 || dx > 8) return; // was a scroll/swipe, not a tap
            e.preventDefault();
            e.stopPropagation();
            acPick(Number(el.dataset.i));
          });
        });
      }

      // Always reset to first item
      ac.activeIndex = items.length ? 0 : -1;
      if (ac.activeIndex === 0) acSetActive(0);
      // Ignore mouseenter until the user actually moves the mouse (prevents
      // the cursor already hovering over an item from overriding index 0)
      ac.ignoreMouseEnter = true;

      // Position BEFORE making visible so there's no jump.
      // Only decide above/below on the first open (or when switching inputs);
      // subsequent calls while already open just reposition without re-locking direction.
      const alreadyOpen = ac.menu.classList.contains("open") && !switchingInput;
      acRepositionForInput(input, alreadyOpen);
      ac.menu.classList.add("open");
      ac.list.scrollTop = 0; // reset after display:flex so it takes effect
      // Re-position after scroll settles (keyboard/auto-scroll may shift the input)
      setTimeout(() => { acReposition(); acSbSync(); }, 80);
      // Clear ignoreMouseEnter on first real mouse movement
      ac.list.addEventListener("mousemove", () => { ac.ignoreMouseEnter = false; }, { once: true });
    }

    function acRepositionForInput(input, keepDirection){
      if (!ac.menu || !input) return;
      const r = input.getBoundingClientRect();
      if (r.width === 0 && r.height === 0) return;
      const vw = window.innerWidth;
      const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      const menuW = Math.max(220, r.width);
      let left = Math.max(8, r.left);
      if (left + menuW > vw - 8) left = Math.max(8, vw - 8 - menuW);
      const maxH = parseInt(getComputedStyle(ac.menu).maxHeight) || 320;
      // Estimate real menu height from item count rather than always using maxH.
      // This prevents the full-size flash when only 1–2 items are present.
      // Each item is roughly 36px (desktop) / 31px (mobile ≤737px) / 25px (≤508px).
      const itemH = vw <= 508 ? 25 : vw <= 737 ? 31 : 36;
      const itemCount = Math.max(1, ac.items ? ac.items.length : 1);
      const estimatedContentH = itemCount * itemH + 8; // +8 for list padding
      const menuH = Math.min(maxH, estimatedContentH);
      const spaceBelow = vh - r.bottom - 12;
      const spaceAbove = r.top - 12;
      // Re-decide direction on fresh open, or when the menu height changed enough
      // that the original decision would now be different (e.g. user deleted text,
      // fewer results fit below, or more space became available above).
      const wouldOpenBelow = spaceBelow >= menuH || spaceBelow >= spaceAbove;
      if (!keepDirection || wouldOpenBelow !== ac.openBelow) {
        ac.openBelow = wouldOpenBelow;
      }
      if (ac.openBelow) {
        ac.menu.style.top = (r.bottom + 6) + "px";
        ac.menu.style.bottom = "";
      } else {
        // Pin the bottom edge of the dropdown flush above the input.
        // This way the dropdown grows/shrinks upward — no positional bump while typing.
        ac.menu.style.bottom = (window.innerHeight - r.top + 6) + "px";
        ac.menu.style.top = "";
      }
      ac.menu.style.left = left + "px";
      ac.menu.style.width = menuW + "px";
    }

    function acReposition(){
      if (!ac.menu || !ac.input) return;
      if (!ac.menu.classList.contains("open")) return;

      const r = ac.input.getBoundingClientRect();
      if (r.width === 0 && r.height === 0) return;

      const vw = window.innerWidth;
      const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      const menuW = Math.max(220, r.width);
      let left = Math.max(8, r.left);
      if (left + menuW > vw - 8) left = Math.max(8, vw - 8 - menuW);

      // Use the direction locked when the menu first opened (ac.openBelow).
      // Re-evaluate only when the input is genuinely pushed to an edge by scroll.
      const spaceBelow = vh - r.bottom - 12;
      const spaceAbove = r.top - 12;
      if (ac.openBelow && spaceBelow < 30 && spaceAbove > spaceBelow) ac.openBelow = false;
      if (!ac.openBelow && spaceAbove < 30 && spaceBelow > spaceAbove) ac.openBelow = true;

      if (ac.openBelow) {
        ac.menu.style.top = (r.bottom + 6) + "px";
        ac.menu.style.bottom = "";
      } else {
        ac.menu.style.bottom = (window.innerHeight - r.top + 6) + "px";
        ac.menu.style.top = "";
      }
      ac.menu.style.left = left + "px";
      ac.menu.style.width = menuW + "px";
      requestAnimationFrame(() => acSbSync());
    }

    function acHide(){
      if (!ac.menu) return;
      ac.menu.classList.remove("open");
      if (ac.sb) ac.sb.classList.remove("open");
      ac.input = null;
      ac.items = [];
      ac.activeIndex = -1;
      ac.lastRenderKey = "";
      ac.openBelow = true;
      ac.menu.style.bottom = "";
    }

    function acSbSync(){
      if (!ac.sb || !ac.list || !ac.sbThumb || !ac.sbTrack) return;
      const scrollable = ac.list.scrollHeight - ac.list.clientHeight;
      if (scrollable <= 0){
        ac.sb.classList.add("sb-hidden");
        return;
      }
      ac.sb.classList.remove("sb-hidden");
      const trackH = ac.sbTrack.clientHeight;
      const thumbH = Math.max(16, Math.round((ac.list.clientHeight / ac.list.scrollHeight) * trackH));
      const thumbTop = Math.round((ac.list.scrollTop / scrollable) * (trackH - thumbH));
      ac.sbThumb.style.height = thumbH + "px";
      ac.sbThumb.style.top = thumbTop + "px";
    }

    function acSetActive(i){
      ac.activeIndex = i;
      $$(".acItem[data-i]", ac.list).forEach(el => el.classList.toggle("active", Number(el.dataset.i) === i));

      const activeEl = $(`.acItem[data-i="${i}"]`, ac.list);
      if (activeEl){
        const top = activeEl.offsetTop;
        const bottom = top + activeEl.offsetHeight;
        const viewTop = ac.list.scrollTop;
        const viewBottom = viewTop + ac.list.clientHeight;
        if (top < viewTop) ac.list.scrollTop = top;
        else if (bottom > viewBottom) ac.list.scrollTop = bottom - ac.list.clientHeight;
      }
    }

    function acPick(i){
      if (!ac.input) return;
      if (i < 0 || i >= ac.items.length) return;

      ac.input.value = ac.items[i];
      ac.input.dispatchEvent(new Event("input", { bubbles:true }));
      ac.input.dispatchEvent(new Event("change", { bubbles:true }));
      acHide();
    }

    function attachAutocomplete(input, kind){
      if (!input) return;
      if (input.__acBound) return;
      input.__acBound = true;

      input.addEventListener("focus", () => {
        if (input.disabled) return;
        clearTimeout(ac.closeTimer);
        ac.closeTimer = null;
        acShowFor(input, kind, input.value);
      });

      // Reopen on click if already focused
      input.addEventListener("click", () => {
        if (input.disabled) return;
        clearTimeout(ac.closeTimer);
        ac.closeTimer = null;
        if (ac.menu && !ac.menu.classList.contains("open")){
          acShowFor(input, kind, input.value);
        }
      });

      input.addEventListener("input", () => {
        if (input.disabled) return;
        acShowFor(input, kind, input.value);
      });

      input.addEventListener("keydown", (e) => {
        if (!ac.menu || !ac.menu.classList.contains("open")) return;

        if (e.key === "ArrowDown"){
          e.preventDefault();
          if (ac.items.length) acSetActive(Math.min(ac.items.length - 1, ac.activeIndex + 1));
        } else if (e.key === "ArrowUp"){
          e.preventDefault();
          if (ac.items.length) acSetActive(Math.max(0, ac.activeIndex - 1));
        } else if (e.key === "Enter"){
          if (ac.activeIndex >= 0){
            e.preventDefault();
            acPick(ac.activeIndex);
          }
        } else if (e.key === "Escape"){
          e.preventDefault();
          acHide();
        } else if (e.key === "Tab"){
          // Only pick on tab if the input has a value; if it's empty let focus move naturally
          if (ac.activeIndex >= 0 && (input.value || "").trim()){
            acPick(ac.activeIndex);
          } else {
            acHide();
          }
        }
      });

      input.addEventListener("blur", (e) => {
        clearTimeout(ac.closeTimer);
        ac.closeTimer = setTimeout(() => {
          const focused = document.activeElement;
          // If focus moved to another autocomplete input, don't hide
          if (focused && focused.__acBound){
            return;
          }
          // If focus is inside the menu itself, don't hide
          if (ac.menu && ac.menu.contains(focused)){
            return;
          }
          acHide();
        }, 220);
      });
    }

    function wireCollapse(card){
      const btn = card.querySelector("[data-collapse-btn]");
      const header = card.querySelector(".mealTop");
      const body = card.querySelector(".mealBodyDay, .mealBodyFoods");
      if (!header || !body) return;

      function sync(){
        const collapsed = card.classList.contains("collapsed");
        if (btn){
          btn.textContent = collapsed ? "▸" : "▾";
          btn.setAttribute("aria-label", collapsed ? "Expand" : "Collapse");
        }
      }

      function toggle(){
        card.classList.add("animating");
        card.classList.toggle("collapsed");
        sync();

        const done = (e) => {
          if (e.propertyName !== "max-height") return;
          card.classList.remove("animating");
          body.removeEventListener("transitionend", done);
          requestAnimationFrame(() => forceResponsiveReflow());
        };
        body.addEventListener("transitionend", done);
      }

      card.__collapseToggle = toggle;

      header.addEventListener("click", (e) => {
        if (e.target && e.target.closest && e.target.closest("[data-collapse-btn]")) return;
        if (e.target && e.target.closest && e.target.closest("[data-sign-btn]")) return;
        toggle();
      });

      if (btn){
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          toggle();
        });
      }

      const init = card.dataset.initCollapsed;
      if (init === "1") card.classList.add("collapsed");
      if (init === "0") card.classList.remove("collapsed");
      sync();
    }

    // Compact: remove ALL interior empty rows (gap-fill), keep exactly one trailing empty.
    // Deferred with requestAnimationFrame to avoid removing a node that still owns focus/blur.
    function compactAndEnsureTrailing(tbody, buildRowFn){
      requestAnimationFrame(() => {
        if (!tbody.isConnected) return;

        const all = $$("tr", tbody).filter(tr => !tr.classList.contains("sumRow"));
        if (all.length === 0) return;

        const sumRow = $("tr.sumRow", tbody);

        // Don't remove the row that currently has focus — removing it blurs the input
        // which triggers another compactAndEnsureTrailing and hides the autocomplete
        const focusedRow = document.activeElement ? document.activeElement.closest("tr") : null;

        // Separate non-empty and empty rows (preserving order of non-empty)
        const nonEmpty = all.filter(tr => !isMealRowEmpty(tr));
        const emptyRows = all.filter(tr => isMealRowEmpty(tr));

        // Remove all empty rows except keep at most one at the end
        // Never remove the row that currently has focus
        emptyRows.forEach(tr => { if (tr.isConnected && tr !== focusedRow) tr.remove(); });

        // Re-read after removal
        const remaining = $$("tr", tbody).filter(tr => !tr.classList.contains("sumRow"));

        // If we removed the only trailing empty, add one back (unless at max capacity).
        // A focused empty row counts as the trailing empty even if it's not at the end —
        // it will be moved/removed once focus leaves, so don't add a second empty row.
        const hasTrailing = remaining.length > 0 && isMealRowEmpty(remaining[remaining.length - 1]);
        const hasFocusedEmpty = focusedRow && focusedRow.isConnected && isMealRowEmpty(focusedRow);
        if (!hasTrailing && !hasFocusedEmpty && nonEmpty.length < 5){
          const newTr = buildRowFn();
          if (sumRow && sumRow.isConnected) tbody.insertBefore(newTr, sumRow);
          else tbody.appendChild(newTr);
        }

        // Enforce max 5 data rows + 1 trailing empty = 6 total
        const afterAll = $$("tr", tbody).filter(tr => !tr.classList.contains("sumRow"));
        while (afterAll.length > 6){
          const last = afterAll.pop();
          if (last.isConnected && isMealRowEmpty(last)) last.remove();
          else break;
        }
      });
    }

    function ensureTrailingEmptyRowsForMeal(tbody, buildRowFn){
      // Legacy call sites — delegate to the safe deferred version
      compactAndEnsureTrailing(tbody, buildRowFn);
    }

    function mealCardByName(name){

    function computeDerivedLockedGroups(day){
      const locked = new Set();
      if (!day || !Array.isArray(day.meals)) return locked;

      day.meals.forEach(meal => {
        const mealNameUpper = (meal.name || "").toUpperCase();
        const isGroupMeal = (mealNameUpper in groups);
        const signed = !!meal.meal_closed;
        if (!signed) return;
        if (isGroupMeal) return;

        (meal.foods || []).forEach(f => {
          const n = (f.name || "").toUpperCase();
          if (n in groups) locked.add(n);
        });
      });

      return locked;
    }

    function sumMeal(mealName){
      const card = mealCardByName(mealName);
      if (!card) return {protein:0,fat:0,calories:0,hasAny:false};

      const rows = $$("tbody tr", card).filter(tr => !tr.classList.contains("sumRow"));
      let p=0,f=0,c=0;
      let hasAny = false;

      rows.forEach(tr => {
        const name = $("td:nth-child(1) input", tr).value.trim();
        const w = $("td:nth-child(2) input", tr).value.trim();
        const pv = $("td:nth-child(3) input", tr).value.trim();
        const fv = $("td:nth-child(4) input", tr).value.trim();
        const cv = $("td:nth-child(5) input", tr).value.trim();

        if (name && (w || (name.toUpperCase() in groups))) hasAny = true;
        if (pv !== "") p += Number(pv);
        if (fv !== "") f += Number(fv);
        if (cv !== "") c += Number(cv);
      });

      p = round2(p); f = round2(f); c = round2(c);

      const footer = $("tr.sumRow", card);
      footer.querySelector("[data-sum='p']").textContent = p;
      footer.querySelector("[data-sum='f']").textContent = f;
      footer.querySelector("[data-sum='c']").textContent = c;

      return {protein:p, fat:f, calories:c,hasAny};
    }

    function groupMealNameFromUpper(groupUpper){
      return groupUpper[0] + groupUpper.slice(1).toLowerCase();
    }

    function getGroupTotals(groupUpper){
      const mealName = groupMealNameFromUpper(groupUpper);
      const sums = sumMeal(mealName);
      const hasAny = sums.hasAny;
      return {
        protein: round2(sums.protein),
        fat: round2(sums.fat),
        calories: round2(sums.calories),
        hasAny
      };
    }

    function propagateGroupRow(groupUpper, p, f, c){
      $$(".mealCard tbody tr").forEach(tr => {
        if (tr.classList.contains("sumRow")) return;
        const nameInput = $("td:nth-child(1) input", tr);
        if (!nameInput) return;
        if (nameInput.value.trim().toUpperCase() !== groupUpper) return;

        const card = tr.closest(".mealCard");
        const mealName = card.dataset.meal || "";

        const isLocked = card.dataset.locked === "1";
        if (isLocked) return;

        const wInput = $("td:nth-child(2) input", tr);
        const pInput = $("td:nth-child(3) input", tr);
        const fInput = $("td:nth-child(4) input", tr);
        const cInput = $("td:nth-child(5) input", tr);

        wInput.value = "";
        wInput.disabled = true;
        pInput.value = p;
        fInput.value = f;
        cInput.value = c;

        sumMeal(mealName);

        const tbody = tr.closest("tbody");
        ensureTrailingEmptyRowsForMeal(tbody,
          typeof tbody.__buildRowEmpty === "function"
            ? tbody.__buildRowEmpty
            : () => {
                const empty = document.createElement("tr");
                empty.innerHTML = `
                  <td><input class="cellInput" value="" /></td>
                  <td class="num"><input class="cellInput" inputmode="decimal" value="" placeholder="" /></td>
                  <td class="num"><input class="cellInput" disabled value="" /></td>
                  <td class="num"><input class="cellInput" disabled value="" /></td>
                  <td class="num"><input class="cellInput" disabled value="" /></td>
                `;
                return empty;
              }
        );

        enforceMax5Rows(tbody);
      });
    }

    function updateGroupMealTotals(groupMealUpper){
      const gt = getGroupTotals(groupMealUpper);
      propagateGroupRow(groupMealUpper, gt.protein, gt.fat, gt.calories);
    }

    function computeNeeded(){
      const weight = Number($("#weightInput").value || 0);
      const proteinNeeded = Number(settings.daily.protein) * weight;

      const bd = parseDdmmyyyy(settings.person.birth_day);
      const cur = parseDdmmyyyy(currentDayDdmmyyyy);
      const age = Math.floor((cur.getTime() - bd.getTime()) / (365.2425 * 24 * 3600 * 1000));

      const caloriesNeeded =
        (10 * weight + 6.25 * Number(settings.person.height) - 5 * age + 5) *
        Number(settings.daily.tdee_multiplier) -
        Number(settings.daily.calories);

      const fatCaloriesNeeded = caloriesNeeded * Number(settings.daily.fat);

      return {
        proteinNeeded: round2(proteinNeeded),
        caloriesNeeded: round2(caloriesNeeded),
        fatCaloriesNeeded: round2(fatCaloriesNeeded)
      };
    }

    function setMiniState(el, ok){
      el.classList.remove("ok","bad");
      el.classList.add(ok ? "ok" : "bad");
    }

    function computeAllTotals(){
      let totalProtein = 0;
      let totalFat = 0;
      let totalCalories = 0;

      $$("#viewDay .mealCard").forEach(card => {
        const mealName = card.dataset.meal.toUpperCase();
        if (mealName in groups) return;

        const footer = $("tr.sumRow", card);
        totalProtein += Number(footer.querySelector("[data-sum='p']").textContent || 0);
        totalFat += Number(footer.querySelector("[data-sum='f']").textContent || 0);
        totalCalories += Number(footer.querySelector("[data-sum='c']").textContent || 0);
      });

      totalProtein = round2(totalProtein);
      totalFat = round2(totalFat);
      totalCalories = round2(totalCalories);
      const fatCalories = round2(totalFat * 9);

      $("#sumProtein").textContent = totalProtein;
      $("#sumFatCal").textContent = fatCalories;
      $("#sumCalories").textContent = totalCalories;

      const need = computeNeeded();
      $("#needProtein").textContent = need.proteinNeeded;
      $("#needFatCal").textContent = need.fatCaloriesNeeded;
      $("#needCalories").textContent = need.caloriesNeeded;

      const leftProtein = round2(need.proteinNeeded - totalProtein);
      const leftFat = round2(need.fatCaloriesNeeded - fatCalories);
      const leftCalories = round2(need.caloriesNeeded - totalCalories);

      $("#leftProtein").textContent = leftProtein;
      $("#leftFatCal").textContent = leftFat;
      $("#leftCalories").textContent = leftCalories;

      const calorieType = settings.daily.calorie_type;
      setMiniState($("#miniProtein"),  leftProtein  <= 0);
      setMiniState($("#miniFat"),      leftFat      >= 0);
      setMiniState($("#miniCalories"), calorieType === "deficit" ? leftCalories >= 0 : leftCalories <= 0);
    }

    function collectUiDraftDay(){
      const rawWeight = $("#weightInput").value.trim();
      if (rawWeight !== "" && isNaN(Number(rawWeight))){
        const wi = $("#weightInput");
        if (wi){ wi.focus(); wi.select(); }
        throw new Error("Weight must be a number");
      }
      const weight = Number(rawWeight || 0);

      const meals = [];
      $$("#viewDay .mealCard").forEach(card => {
        const mealName = card.dataset.meal;

        const foods = [];
        const rows = $$("tbody tr", card).filter(tr => !tr.classList.contains("sumRow"));

        rows.forEach(tr => {
          const name = $("td:nth-child(1) input", tr).value.trim();
          const w = $("td:nth-child(2) input", tr).value.trim();
          const p = $("td:nth-child(3) input", tr).value.trim();
          const f = $("td:nth-child(4) input", tr).value.trim();
          const c = $("td:nth-child(5) input", tr).value.trim();

          if (!name) {
            if (w !== "") {
              const nameInput = $("td:nth-child(1) input", tr);
              if (nameInput) { nameInput.focus(); nameInput.select(); }
              throw new Error("A row has a weight but no food name");
            }
            return;
          }

          const up = name.toUpperCase();
          if (!(up in foodsMap) && !(up in groups)){
            throw new Error("Food Doesn't Exist: " + name);
          }

          if (w === "" && !(up in groups)){
            const wInput = $("td:nth-child(2) input", tr);
            if (wInput) { wInput.focus(); wInput.select(); }
            throw new Error("Missing weight for: " + name);
          }

          if (w !== "" && isNaN(Number(w))){
            const wInput = $("td:nth-child(2) input", tr);
            if (wInput) { wInput.focus(); wInput.select(); }
            throw new Error("Invalid weight for: " + name);
          }

          foods.push({ name, weight: w, protein: p, fat: f, calories: c });
        });

        meals.push({
          name: mealName,
          foods,
          meal_closed: !!mealClosedState[mealName]
        });
      });

      const draft = {
        date: currentDayDdmmyyyy,
        day_closed: !!currentDayDayClosed,
        weight,
        meals
      };

      if (draft.day_closed){
        draft.meals.forEach(m => { m.meal_closed = true; });
        return draft;
      }

      const derivedLocked = computeDerivedLockedGroups(draft);

      draft.meals.forEach(m => {
        const upMeal = String(m.name || "").toUpperCase();

        if (upMeal in groups){
          m.meal_closed = derivedLocked.has(upMeal);
        } else {
          m.meal_closed = !!mealClosedState[m.name];
        }
      });

      return draft;
    }

    function collectDayPayload(){
      const d = collectUiDraftDay();
      return { weight: d.weight, meals: d.meals };
    }

    function computeGroupsInMealFromDraft(draftDay, mealName){
      const s = new Set();
      const m = (draftDay.meals || []).find(x => (x.name || "") === mealName);
      if (!m || !Array.isArray(m.foods)) return s;
      m.foods.forEach(f => {
        const up = String(f?.name || "").trim().toUpperCase();
        if (up && (up in groups)) s.add(up);
      });
      return s;
    }

    function collapseAfterSign(draftDay, mealName){
      if (mealUiState.date !== currentDayDdmmyyyy){
        mealUiState = { date: currentDayDdmmyyyy, collapsed: {} };
      }

      mealUiState.collapsed[mealName] = true;

      const derived = computeDerivedLockedGroups(draftDay);
      (draftDay.meals || []).forEach(m => {
        const up = (m.name || "").toUpperCase();
        if (up in groups && derived.has(up)){
          mealUiState.collapsed[m.name] = true;
        }
      });
    }

    function buildMealsUI(day){
      const wrap = $("#mealsWrap");
      wrap.innerHTML = "";

      const dayClosed = !!day.day_closed;
      const derivedLockedGroups = computeDerivedLockedGroups(day);

      day.meals.forEach(meal => {
        const mealNameUpper = (meal.name || "").toUpperCase();
        const isGroupMeal = (mealNameUpper in groups);

        const signed = !!meal.meal_closed;
        const derivedLocked = isGroupMeal && derivedLockedGroups.has(mealNameUpper);

        const locked = dayClosed || signed || derivedLocked;
        const canToggleSign = !dayClosed && !isGroupMeal;

        const card = document.createElement("div");
        card.className = "mealCard";
        card.dataset.meal = meal.name;
        card.dataset.locked = locked ? "1" : "0";

        const header = document.createElement("div");
        header.className = "mealTop";

        const signBtnHtml = (() => {
          if (dayClosed) return "";
          if (!isGroupMeal){
            if (signed){
              return `<button class="signBtn signed" type="button" data-sign-btn title="Unsign">✓</button>`;
            }
            return `<button class="signBtn" type="button" data-sign-btn title="Sign">✓</button>`;
          }
          if (derivedLocked){
            return `<button class="signBtn derived" type="button" data-sign-btn disabled title="Locked by signed meal">✓</button>`;
          }
          return `<button class="signBtn" type="button" data-sign-btn disabled title="Group meal cannot be signed">✓</button>`;
        })();

        header.innerHTML = `
          <div class="mealName">${escapeHtml(meal.name)}</div>
          <div class="mealTopRight">
            ${signBtnHtml}
            <button class="collapseBtn" type="button" data-collapse-btn>▾</button>
          </div>
        `;

        const body = document.createElement("div");
        body.className = "mealBodyDay";

        const table = document.createElement("table");
        table.className = "table";
        table.innerHTML = `
          <thead>
            <tr>
              <th style="width:38%">Name</th>
              <th class="num" style="width:16%;">Weight</th>
              <th class="num" style="width:15%;">Protein</th>
              <th class="num" style="width:13%;">Fat</th>
              <th class="num" style="width:18%;">Calories</th>
            </tr>
          </thead>
          <tbody></tbody>
        `;

        const tbody = $("tbody", table);

        function buildRow(food){
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>
              <input class="cellInput" ${locked ? "disabled" : ""} value="${escapeHtml(food?.name || "")}" placeholder="" type="search"/>
            </td>
            <td class="num">
              <input class="cellInput" ${locked ? "disabled" : ""} inputmode="decimal"
                value="${escapeHtml(food?.weight ?? "")}" placeholder="" type="search"/>
            </td>
            <td class="num"><input class="cellInput" disabled value="${escapeHtml(food?.protein ?? "")}" /></td>
            <td class="num"><input class="cellInput" disabled value="${escapeHtml(food?.fat ?? "")}" /></td>
            <td class="num"><input class="cellInput" disabled value="${escapeHtml(food?.calories ?? "")}" /></td>
          `;

          const nameInput = $("td:nth-child(1) input", tr);
          const wInput = $("td:nth-child(2) input", tr);
          const pInput = $("td:nth-child(3) input", tr);
          const fInput = $("td:nth-child(4) input", tr);
          const cInput = $("td:nth-child(5) input", tr);

          const kind = (() => {
            if (!isGroupMeal) return "FOODS";
            if (mealNameUpper === "FRUITS") return "FRUITS";
            if (mealNameUpper === "NUTS") return "NUTS";
            if (mealNameUpper === "VEGETABLES") return "VEGETABLES";
            return "FOODS";
          })();

          attachAutocomplete(nameInput, kind);

          const initialName = (nameInput.value || "").trim().toUpperCase();
          if (initialName in groups){
            wInput.value = "";
            wInput.disabled = true;
          }

          function ensureTrailingAndMax5(){
            if (locked) return;
            ensureTrailingEmptyRowsForMeal(tbody, () => buildRow(null));
            enforceMax5Rows(tbody);
          }

          function updateRowNutrition(){
            if (locked) return;

            const name = (nameInput.value || "").trim();
            const up = name.toUpperCase();
            const weight = (wInput.value || "").trim();

            ensureTrailingAndMax5();

            if (up in groups){
              wInput.value = "";
              wInput.disabled = true;

              const gt = getGroupTotals(up);
              pInput.value = gt.protein;
              fInput.value = gt.fat;
              cInput.value = gt.calories;

              sumMeal(meal.name);
              computeAllTotals();
              ensureTrailingAndMax5();
              return;
            }

            wInput.disabled = false;

            if (!name){
              pInput.value = ""; fInput.value = ""; cInput.value = "";
              if (mealNameUpper in groups) updateGroupMealTotals(mealNameUpper);
              sumMeal(meal.name);
              computeAllTotals();
              ensureTrailingAndMax5();
              return;
            }

            if (!(up in foodsMap)){
              pInput.value = ""; fInput.value = ""; cInput.value = "";
              if (mealNameUpper in groups) updateGroupMealTotals(mealNameUpper);
              sumMeal(meal.name);
              computeAllTotals();
              ensureTrailingAndMax5();
              return;
            }

            if (weight && !isNaN(Number(weight))){
              pInput.value = round2(calcFoodValue(name, "protein", weight));
              fInput.value = round2(calcFoodValue(name, "fat", weight));
              cInput.value = round2(calcFoodValue(name, "calories", weight));
            }else{
              pInput.value = ""; fInput.value = ""; cInput.value = "";
            }

            if (mealNameUpper in groups){
              updateGroupMealTotals(mealNameUpper);
            }

            sumMeal(meal.name);
            computeAllTotals();
            ensureTrailingAndMax5();
          }

          if (!locked){
            nameInput.addEventListener("input", updateRowNutrition);
            nameInput.addEventListener("change", updateRowNutrition);
            nameInput.addEventListener("search", () => setTimeout(updateRowNutrition, 0));
            nameInput.addEventListener("blur", updateRowNutrition);
            wInput.addEventListener("focus", () => {
              if (wInput.value === "0" || wInput.value === "0.0" || wInput.value === "0.00") wInput.value = "";
            });
            wInput.addEventListener("input", updateRowNutrition);
            wInput.addEventListener("search", updateRowNutrition);
            wInput.addEventListener("blur", () => {
              if (wInput.value === "") wInput.value = "0";
              updateRowNutrition();
            });
          }

          return tr;
        }

        // Assign BEFORE rendering foods so propagateGroupRow (called inside
        // buildRow via updateGroupMealTotals) can already use it
        tbody.__buildRowEmpty = () => buildRow(null);

        const foods = Array.isArray(meal.foods) ? meal.foods : [];
        foods.forEach(f => tbody.appendChild(buildRow(f)));

        if (!locked) tbody.appendChild(buildRow(null));

        const tfoot = document.createElement("tr");
        tfoot.className = "sumRow";
        tfoot.innerHTML = `
          <td>Sum</td>
          <td class="num"></td>
          <td class="num" data-sum="p">0</td>
          <td class="num" data-sum="f">0</td>
          <td class="num" data-sum="c">0</td>
        `;
        tbody.appendChild(tfoot);

        body.appendChild(table);
        card.appendChild(header);
        card.appendChild(body);
        wrap.appendChild(card);

        card.dataset.initCollapsed = dayClosed ? "0" : (initialCollapsedForMeal(meal.name, locked) ? "1" : "0");
        wireCollapse(card);

        const signBtn = card.querySelector("[data-sign-btn]");
        if (signBtn && canToggleSign){
          signBtn.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();

            try{
              snapshotMealCollapse();

              const draftBefore = collectUiDraftDay();
              const cur = !!mealClosedState[meal.name];
              const next = !cur;

              const groupsInThisMeal = computeGroupsInMealFromDraft(draftBefore, meal.name);

              mealClosedState[meal.name] = next;

              if (mealUiState.date !== currentDayDdmmyyyy){
                mealUiState = { date: currentDayDdmmyyyy, collapsed: {} };
              }

              if (next){
                const draftAfter = JSON.parse(JSON.stringify(draftBefore));
                (draftAfter.meals || []).forEach(m => {
                  const isThis = (m.name === meal.name);
                  const upMeal = String(m.name || "").toUpperCase();

                  if (upMeal in groups){
                    m.meal_closed = false;
                  } else {
                    m.meal_closed = isThis ? true : !!mealClosedState[m.name];
                  }
                });

                collapseAfterSign(draftAfter, meal.name);
              } else {
                mealUiState.collapsed[meal.name] = false;

                const draftAfter = JSON.parse(JSON.stringify(draftBefore));
                (draftAfter.meals || []).forEach(m => {
                  m.meal_closed = !!mealClosedState[m.name];
                });

                const derivedNow = computeDerivedLockedGroups(draftAfter);
                groupsInThisMeal.forEach(groupUpper => {
                  if (!derivedNow.has(groupUpper)){
                    const groupMealName = groupMealNameFromUpper(groupUpper);
                    mealUiState.collapsed[groupMealName] = false;
                  }
                });
              }

              const draftRender = JSON.parse(JSON.stringify(draftBefore));
              (draftRender.meals || []).forEach(m => {
                const upM = String(m.name || "").toUpperCase();
                if (!(upM in groups)) m.meal_closed = !!mealClosedState[m.name];
              });
              const derivedForRender = computeDerivedLockedGroups(draftRender);
              (draftRender.meals || []).forEach(m => {
                const upM = String(m.name || "").toUpperCase();
                if (upM in groups) m.meal_closed = derivedForRender.has(upM);
              });

              // Animate the card before re-rendering so the collapse looks smooth
              const isCollapsing = next; // signing = collapsing, unsigning = expanding
              const currentCard = signBtn.closest(".mealCard");
              const cardBody = currentCard && currentCard.querySelector(".mealBodyDay, .mealBodyFoods");
              const alreadyCollapsed = currentCard && currentCard.classList.contains("collapsed");

              if (currentCard && cardBody && !alreadyCollapsed && isCollapsing){
                // Animate collapse, then re-render after transition
                currentCard.classList.add("animating");
                currentCard.classList.add("collapsed");
                const done = (ev) => {
                  if (ev.propertyName !== "max-height") return;
                  currentCard.classList.remove("animating");
                  cardBody.removeEventListener("transitionend", done);
                  renderDay(draftRender);
                };
                cardBody.addEventListener("transitionend", done);
                // Safety fallback in case transitionend doesn't fire
                setTimeout(() => { cardBody.removeEventListener("transitionend", done); renderDay(draftRender); }, 400);
              } else {
                renderDay(draftRender);
              }
            }catch(err){
              toast("err", err.message || "Failed");
            }
          });
        }

        sumMeal(meal.name);
        if (!locked) {
          ensureTrailingEmptyRowsForMeal(tbody, () => buildRow(null));
          enforceMax5Rows(tbody);
        }
      });

      computeAllTotals();
    }

    function computeAllTotalsWithGroupUpdates(day){
      if (!day.day_closed){
        Object.keys(groups).forEach(g => updateGroupMealTotals(g));
      }
      computeAllTotals();
    }

        function ensureFoodTrailingEmptyRow(){
