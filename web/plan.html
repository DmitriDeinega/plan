            <td class="num"><input class="cellInput" inputmode="decimal" value="${escapeHtml(food?.protein ?? "")}" /></td>
            <td class="num"><input class="cellInput" inputmode="decimal" value="${escapeHtml(food?.fat ?? "")}" /></td>
            <td class="num"><input class="cellInput" inputmode="decimal" value="${escapeHtml(food?.calories ?? "")}" /></td>
            <td><input class="cellInput" value="${escapeHtml(food?.inner_type || "")}" /></td>
            <td><input class="cellInput" value="${escapeHtml(food?.available || "")}" /></td>
          `;

          $$("input", tr).forEach(i => i.addEventListener("input", ensureFoodTrailingEmptyRow));
          // Select full text on focus for avl (last column) so typing replaces it directly
          $("td:last-child input", tr).addEventListener("focus", function(){ this.select(); });
          return tr;
        }

        (byType[t] || []).forEach(r => tbody.appendChild(buildFoodRow(r)));
        tbody.appendChild(buildFoodRow(null));
        ensureFoodTrailingEmptyRow();

        wrap.appendChild(card);

        card.dataset.initCollapsed = "0";
        wireCollapse(card);
      });
    }

    async function saveFoods(){
      try{
        const foodsForAPI = [];
        const cards = $$("#foodsEditor .mealCard");

        cards.forEach(card => {
          const type = card.dataset.type;
          const rows = $$("tbody tr", card);

          rows.forEach(tr => {
            const tds = $$("td input", tr);
            const vals = tds.map(x => x.value.trim());
            const [name, protein, fat, calories, innerType, available] = vals;

            if (!name && !protein && !fat && !calories && !innerType && !available) return;

            if (!name && (protein || fat || calories)) {
              const nameInput = $("td:nth-child(1) input", tr);
              if (nameInput) { nameInput.focus(); nameInput.select(); }
              throw new Error("A row has values but no food name");
            }
            if (name && (!protein && !fat && !calories)) {
              const proteinInput = $("td:nth-child(2) input", tr);
              if (proteinInput) { proteinInput.focus(); proteinInput.select(); }
              throw new Error("Missing nutritional values for: " + name);
            }
            foodsForAPI.push({ type, name, protein, fat, calories, inner_type: innerType, available });
          });
        });

        await apiPut("foods", { foods: foodsForAPI });
        toast("ok", "Saved Successfully");
        await loadSettings();
        await loadFoods();
        await loadDayByDate(currentDayDdmmyyyy);
      }catch(e){
        toast("err", e.message || "Foods save failed");
        showViewError("Foods", "Foods", e.message || "Foods save failed", () => saveFoods());
      }
    }

    function initMealClosedStateFromDay(day){
      mealClosedState = {};
      (day.meals || []).forEach(m => {
        mealClosedState[m.name] = !!m.meal_closed;
      });
    }

    function applyMealClosedStateToDay(day){
      (day.meals || []).forEach(m => {
        m.meal_closed = !!mealClosedState[m.name];
      });
      return day;
    }

    async function loadOpenDay(){
      clearViewError("Day");

      const prevDay = currentDayDdmmyyyy;
      const prevTemplate = currentDayTemplate ? JSON.parse(JSON.stringify(currentDayTemplate)) : null;
      const prevClosedState = JSON.parse(JSON.stringify(mealClosedState || {}));

      try{
        const r = await apiGet("days/open");
        validateDayShape(r.day);

        const ddmmyyyy = r.day.date;
        openDayObj = parseDdmmyyyy(ddmmyyyy);

        currentDayDdmmyyyy = ddmmyyyy;
        currentDayTemplate = JSON.parse(JSON.stringify(r.day));
        currentDayDayClosed = !!r.day.day_closed;

        initMealClosedStateFromDay(currentDayTemplate);
        mealUiState = { date: "", collapsed: {} };

        renderDay(applyMealClosedStateToDay(JSON.parse(JSON.stringify(currentDayTemplate))));

        setNavButtons();
        initOrUpdateDatePicker();
        updateFloatingActions();
        forceResponsiveReflow();

        clearViewError("Day");
      }catch(e){
        currentDayDdmmyyyy = prevDay;
        currentDayTemplate = prevTemplate;
        mealClosedState = prevClosedState;

        const msg = e.message || "Open day failed";
        toast("err", msg);
        showViewError("Day", "Day", msg, () => loadOpenDay());
      }
    }

    async function loadDayByDate(ddmmyyyy){
      clearViewError("Day");

      const prevDay = currentDayDdmmyyyy;
      const prevTemplate = currentDayTemplate ? JSON.parse(JSON.stringify(currentDayTemplate)) : null;
      const prevClosedState = JSON.parse(JSON.stringify(mealClosedState || {}));
      const seq = ++dayLoadSeq;

      if (dayLoadAbort) dayLoadAbort.abort(new Error("New day selected"));
      dayLoadAbort = new AbortController();

      try{
        const r = await fetchJson("days/" + ddmmyyyy, { method:"GET", signal: dayLoadAbort.signal });

        if (seq !== dayLoadSeq) return;

        validateDayShape(r.day);

        const nextTemplate = JSON.parse(JSON.stringify(r.day));

        currentDayDdmmyyyy = ddmmyyyy;
        currentDayTemplate = nextTemplate;
        currentDayDayClosed = !!nextTemplate.day_closed;

        initMealClosedStateFromDay(currentDayTemplate);
        mealUiState = { date: "", collapsed: {} };

        renderDay(applyMealClosedStateToDay(JSON.parse(JSON.stringify(currentDayTemplate))));

        setNavButtons();
        initOrUpdateDatePicker();
        updateFloatingActions();
        forceResponsiveReflow();

        clearViewError("Day");
      }catch(e){
        currentDayDdmmyyyy = prevDay;
        currentDayTemplate = prevTemplate;
        mealClosedState = prevClosedState;

        if (fp && prevDay){
          fp.setDate(parseDdmmyyyy(prevDay));
          $("#dateInput").value = dateInputFromDdmmyyyy(prevDay);
        }

        const msg = e.message || "Failed to load day";
        toast("err", msg);
        showViewError("Day", "Day", msg, () => loadDayByDate(ddmmyyyy));
      }
    }

    function renderDay(day){
      currentDayDayClosed = !!day.day_closed;

      $("#weightInput").value = day.weight != null ? String(day.weight) : "";
      $("#weightInput").disabled = !!day.day_closed;

      if (Array.isArray(day.meals)){
        day.meals.forEach(m => {
          if (m.meal_closed == null) m.meal_closed = false;
        });
      }

      buildMealsUI(day);
      computeAllTotalsWithGroupUpdates(day);
      updateFloatingActions();
      updateDayDot();
    }

    async function loadWeights(){
      clearViewError("Weights");

      try{
        const r = await apiGet("weights");

        const days = r.days || [];
        const weights = [];
        const start = startDateObj;

        const dayCount = Math.floor((openDayObj.getTime() - start.getTime()) / (1000*3600*24)) + 1;
        const weeks = Math.ceil(dayCount / 7);

        const avgSum = Array(weeks).fill(0);
        const avgCnt = Array(weeks).fill(0);
        const reduction = Array(weeks).fill(null);

        days.forEach(d => {
          if (Number(d.weight) !== 0){
            const dt = parseDdmmyyyy(d.date);
            weights.push({ label: dateInputFromDdmmyyyy(d.date), y: Number(d.weight), dt });

            const pos = Math.floor((dt.getTime() - start.getTime()) / (1000*3600*24) / 7);
            avgSum[pos] += Number(d.weight);
            avgCnt[pos] += 1;

            if (dt.getDay() % 7 === 0){
              reduction[pos] = Number(d.weight);
            }
          }
        });

        const dailyLabels = weights.map(w => w.label);
        const dailyData = weights.map(w => w.y);

        const weeklyAvgLabels = [];
        const weeklyAvgData = [];
        for (let i=0;i<weeks;i++){
          if (avgCnt[i] > 0){
            weeklyAvgLabels.push(String(i+1));
            weeklyAvgData.push(round2(avgSum[i]/avgCnt[i]));
          }
        }

        const weeklyRedLabels = [];
        const weeklyRedData = [];
        for (let i=1;i<weeks;i++){
          if (reduction[i-1] != null && reduction[i] != null){
            weeklyRedLabels.push(String(i));
            weeklyRedData.push(round2(reduction[i-1] - reduction[i]));
          }
        }

        // Create once, otherwise update in-place
        if (!chartDaily){
          chartDaily = new Chart($("#chartDaily"), {
            type: "line",
            data: { labels: dailyLabels, datasets: [{ label:"Weight", data: dailyData, pointRadius:3, tension:0.25 }] },
            options: { responsive:true, scales:{ y:{ title:{ display:true, text:"Weight" } }, x:{ ticks:{ display: false } } } }
          });
        } else {
          chartDaily.data.labels = dailyLabels;
          chartDaily.data.datasets[0].data = dailyData;
          chartDaily.update();
        }

        if (!chartWeeklyAvg){
          chartWeeklyAvg = new Chart($("#chartWeeklyAvg"), {
            type: "line",
            data: { labels: weeklyAvgLabels, datasets: [{ label:"Weekly Average", data: weeklyAvgData, pointRadius:3, tension:0.25 }] },
            options: { responsive:true, scales:{ y:{ title:{ display:true, text:"Weight" } }, x:{ ticks:{ display: false } } } }
          });
        } else {
          chartWeeklyAvg.data.labels = weeklyAvgLabels;
          chartWeeklyAvg.data.datasets[0].data = weeklyAvgData;
          chartWeeklyAvg.update();
        }

        if (!chartWeeklyRed){
          chartWeeklyRed = new Chart($("#chartWeeklyReduction"), {
            type: "bar",
            data: { labels: weeklyRedLabels, datasets: [{ label:"Weekly Reduction", data: weeklyRedData }] },
            options: { responsive:true, scales:{ y:{ title:{ display:true, text:"Reduction" } }, x:{ ticks:{ display: false } } } }
          });
        } else {
          chartWeeklyRed.data.labels = weeklyRedLabels;
          chartWeeklyRed.data.datasets[0].data = weeklyRedData;
          chartWeeklyRed.update();
        }

        forceResponsiveReflow();
        clearViewError("Weights");
      }catch(e){
        const msg = e.message || "Weights failed";
        toast("err", msg);
        showViewError("Weights", "Weights", msg, () => loadWeights());
      }
    }

    async function revertDay(){
      try{
        await apiPost("days/" + currentDayDdmmyyyy + "/revert");
        toast("ok", "Reverted Successfully");
        await loadOpenDay();
        setActiveView("Day");
      }catch(e){
        const msg = e.message || "Revert failed";
        toast("err", msg);
        showViewError("Day", "Day", msg, () => revertDay());
      }
    }

    function updateDayDot(){
      const el = $("#dayDot");
      if (!el) return;

      const open = !currentDayDayClosed;

      el.classList.remove("open","closed");
      el.classList.add(open ? "open" : "closed");
      el.title = open ? "Open day" : "Closed day";
    }

    // Cache the scroll threshold once (panel's natural distance from scroller content top)
    let _stuckThreshold = null;
    function getStuckThreshold(){
      if (_stuckThreshold !== null) return _stuckThreshold;
      const panel = document.getElementById("dayStickyPanel");
      const scroller = document.getElementById("contentScroll");
      if (!panel || !scroller) return 0;
      // Temporarily remove is-stuck to measure natural position
      const wasStuck = panel.classList.contains("is-stuck");
      panel.classList.remove("is-stuck");
      // Walk offsetParent chain until we hit the scroller
      let el = panel, dist = 0;
      while (el && el !== scroller) { dist += el.offsetTop; el = el.offsetParent; }
      if (wasStuck) panel.classList.add("is-stuck");
      _stuckThreshold = Math.max(0, dist - 2);
      return _stuckThreshold;
    }

    function updateStuck(noAnim){
      const panel = document.getElementById("dayStickyPanel");
      const scroller = document.getElementById("contentScroll");
      if (!panel || !scroller) return;
      if (noAnim) panel.classList.add("noTrans");
      panel.classList.toggle("is-stuck", scroller.scrollTop >= getStuckThreshold());
      if (noAnim){ panel.offsetHeight; requestAnimationFrame(() => panel.classList.remove("noTrans")); }
    }

    function enableStickyObserver(){
      const scroller = document.getElementById("contentScroll");
      if (!scroller || _stickyScrollBound) return;
      _stickyScrollBound = true;
      scroller.addEventListener("scroll", () => updateStuck(false), { passive: true });
    }

    function disableStickyObserver(){ /* scroll listener persists harmlessly when Day is hidden */ }

    function syncStickyNowNoAnim(){ updateStuck(true); }

    function wireUI(){
      $$(".navBtn").forEach(btn => {
        btn.addEventListener("click", async () => setActiveView(btn.dataset.view));
      });

      $("#saveDayBtn").addEventListener("click", async () => saveDay());
      $("#endBtn").addEventListener("click", async () => endDay());
      $("#saveFoodsBtn").addEventListener("click", async () => saveFoods());
      $("#revertBtn").addEventListener("click", async () => revertDay());

      $("#weightInput").addEventListener("input", () => computeAllTotals());
      $("#weightInput").addEventListener("focus", () => {
        const w = $("#weightInput");
        w._prevWeight = w.value;
        if (w.value === "0" || w.value === "0.0" || w.value === "0.00") {
          w.value = "";
        }
      });
      $("#weightInput").addEventListener("blur", () => {
        const w = $("#weightInput");
        if (w.value.trim() === "") {
          w.value = w._prevWeight || "";
          computeAllTotals();
        }
      });

      let reflowTimer = null;
      window.addEventListener("resize", () => {
        clearTimeout(reflowTimer);
        reflowTimer = setTimeout(forceResponsiveReflow, 50);
      }, { passive:true });

      window.addEventListener("orientationchange", () => forceResponsiveReflow(), { passive:true });
    }

    async function boot(){
      try{
        acInit();
        wireUI();

        window.addEventListener("unhandledrejection", (ev) => {
          const msg = ev?.reason?.message || String(ev?.reason || "Unexpected error");
          toast("err", msg);
          showErrorOnActiveView("Error", msg, () => boot());
        });

        window.addEventListener("error", (ev) => {
          const msg = ev?.error?.message || ev?.message || "Unexpected error";
          toast("err", msg);
          showErrorOnActiveView("Error", msg, () => boot());
        });

        await loadSettings();
        await loadFoods();
        await loadOpenDay();

        setActiveView("Day");
        updateFloatingActions();
        forceResponsiveReflow();
      }catch(e){
        const msg = e.message || "Failed to load";
        toast("err", msg);
        showErrorOnActiveView("Day", msg, () => boot());
      }
    }

    boot();

    /* ============================================================
       MOBILE ENHANCEMENTS
       ============================================================ */

    // Patch forceResponsiveReflow to clear any stale inline display styles
    // on nutrient cells when resizing back to desktop
    const _origForceReflow = forceResponsiveReflow;
    window.forceResponsiveReflow = function(){
      _origForceReflow();
      if (window.innerWidth > 640){
        $$("#viewDay .mealBodyDay tbody tr td, #viewDay .mealBodyFoods tbody tr td").forEach(td => {
          td.style.display = "";
          td.style.alignItems = "";
          td.style.gap = "";
        });
      }
    };

    // Also patch the MutationObserver (kept for future use / chart reflow)
    const _observer = new MutationObserver(() => {
      // intentionally empty — CSS ::before handles mobile labels
    });
    const mealsWrap = $("#mealsWrap");
    if (mealsWrap){
      _observer.observe(mealsWrap, { childList: true, subtree: true });
    }

    /* --- Pull-to-refresh ---
       Detects a downward swipe at the top of the scroll container.
       Calls location.reload() after a brief animation.           */
    (function initPTR(){
      const scroller = $("#contentScroll");
      const indicator = $("#ptrIndicator");
      if (!scroller || !indicator) return;

      const THRESHOLD = 72;   // px of pull needed to trigger
      const MAX_PULL  = 110;  // cap on visual progress
      let startY = 0;
      let pulling = false;
      let triggered = false;

      scroller.addEventListener("touchstart", e => {
        if (scroller.scrollTop > 2) return;
        // Don't start PTR if the touch is inside a scrollable inner section
        const inner = e.target.closest(".foodsInner");
        if (inner && inner.scrollHeight > inner.clientHeight) return;
        startY = e.touches[0].clientY;
        pulling = false;
        triggered = false;
      }, { passive: true });

      scroller.addEventListener("touchmove", e => {
        if (triggered) return;
        // Suppress PTR if gesture is inside a foodsInner (even if it hit top)
        if (e.target.closest(".foodsInner")) { pulling = false; return; }
        const dy = e.touches[0].clientY - startY;
        if (dy <= 0){
          if (pulling) {
            pulling = false;
            indicator.classList.remove("ptr-pulling");
            indicator.style.transform = "scaleX(0)";
          }
          return;
        }
        if (scroller.scrollTop > 2){ pulling = false; return; }

        pulling = true;
        const progress = Math.min(dy / MAX_PULL, 1);
        indicator.style.transform = `scaleX(${progress})`;
        indicator.classList.add("ptr-pulling");
        indicator.classList.remove("ptr-refreshing");

        if (dy > 10 && e.cancelable) e.preventDefault();
      }, { passive: false });

      scroller.addEventListener("touchend", () => {
        if (!pulling) return;
        const scaleMatch = indicator.style.transform.match(/scaleX\(([^)]+)\)/);
        const progress = scaleMatch ? parseFloat(scaleMatch[1]) : 0;
        pulling = false;

        if (progress >= THRESHOLD / MAX_PULL){
          triggered = true;
          indicator.classList.remove("ptr-pulling");
          indicator.classList.add("ptr-refreshing");
          setTimeout(() => location.reload(), 600);
        } else {
          indicator.classList.remove("ptr-pulling");
          indicator.style.transform = "scaleX(0)";
        }
      }, { passive: true });
    })();

  </script>
<script>
(function initKeyboardFix(){
  function isKeyboardOpen(){
    if (!window.visualViewport) return false;
    if (window.visualViewport.offsetTop > 10) return true;
    return window.visualViewport.height < window.screen.height * 0.72;
  }

  function onViewportChange(){
    document.body.classList.toggle("keyboard-open", isKeyboardOpen());
  }

  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", onViewportChange, { passive: true });
    window.visualViewport.addEventListener("scroll", onViewportChange, { passive: true });
  }

  document.addEventListener("focusout", () => {
    setTimeout(() => {
      const ae = document.activeElement;
      const stillTyping = ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA") && !ae.readOnly && !ae.disabled;
      if (!stillTyping) document.body.classList.remove("keyboard-open");
    }, 300);
  });
})();
</script>
