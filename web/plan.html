<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Plan</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <link rel="icon" href="/static/favicon.ico?v=1">

  <style>
    :root{
      --bg0:#070A10;
      --bg1:#0B1020;
      --card: rgba(255,255,255,0.08);
      --stroke: rgba(255,255,255,0.14);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.68);
      --danger:#ff4d4d;
      --ok:#2ef2a8;
      --shadow: 0 16px 50px rgba(0,0,0,0.45);
      --r22: 22px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
      --sticky-top: calc(64px + var(--safe-top));
      --nav-h: 66px;

      --ok-border: rgba(46,242,168,0.78);
      --ok-glow: rgba(46,242,168,0.22);
      --bad-border: rgba(255,77,77,0.78);
      --bad-glow: rgba(255,77,77,0.22);
    }

    *{ box-sizing:border-box; }

    html, body{
      height:100%;
      overflow:hidden;
    }

    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1100px 800px at 25% 20%, rgba(108,231,255,0.10), transparent 60%),
        radial-gradient(900px 700px at 85% 30%, rgba(184,140,255,0.08), transparent 60%),
        radial-gradient(900px 700px at 40% 90%, rgba(46,242,168,0.06), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      background-attachment: fixed;
      background-repeat: no-repeat;
      overflow-x:hidden;
    }

    .envSuffix{
      margin-left: 6px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .35px;
      opacity: .75;
    }

    .dayDot{
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      box-shadow: 0 0 0 2px rgba(0,0,0,0.20) inset;
    }

    .dayDot.open{
      border-color: rgba(46,242,168,0.55);
      background: rgba(46,242,168,0.90);
      box-shadow:
        0 0 0 2px rgba(46,242,168,0.16),
        0 0 18px rgba(46,242,168,0.20);
    }

    .dayDot.closed{
      border-color: rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.18);
      box-shadow: 0 0 0 2px rgba(0,0,0,0.22) inset;
      opacity: 0.55;
    }

    .shell{
      height:100%;
      display:grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr auto;
    }

    .contentScroll{
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-gutter: stable;
      position: relative;
    }

    .contentScroll::-webkit-scrollbar{ width: 10px; height: 10px; }
    .contentScroll::-webkit-scrollbar-track{ background: transparent; }
    .contentScroll::-webkit-scrollbar-thumb{
      background: transparent;
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    .contentScroll:hover::-webkit-scrollbar-track{
      background: rgba(255,255,255,0.03);
      border-radius: 999px;
    }
    .contentScroll:hover::-webkit-scrollbar-thumb{
      background: rgba(108,231,255,0.16);
    }
    .contentScroll:hover::-webkit-scrollbar-thumb:hover{
      background: rgba(184,140,255,0.22);
    }

    .contentScroll{
      scrollbar-width: thin;
      scrollbar-color: rgba(108,231,255,0.16) transparent;
    }

    .topbar{
      position: sticky;
      top:0;
      z-index:20;
      padding: calc(10px + var(--safe-top)) 12px 10px;
      backdrop-filter: blur(14px);
      background: rgba(7,10,16,0.55);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .topbarInner{
      max-width: 1180px;
      margin:0 auto;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
    }
    .brand{
      display:flex;
      gap:10px;
      align-items:center;
      user-select:none;
      cursor:pointer;
      min-width: 160px;
    }
    .logo{
      width:36px;height:36px;
      border-radius: 12px;
      background:
        radial-gradient(18px 18px at 30% 30%, rgba(108,231,255,0.7), transparent 60%),
        radial-gradient(20px 20px at 70% 70%, rgba(184,140,255,0.65), transparent 60%),
        rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.16);
      box-shadow: 0 16px 50px rgba(0,0,0,0.45);
    }
    .brandTitle{
      display:flex;
      flex-direction:column;
      line-height:1.05;
    }
    .brandTitle .t1{ font-weight:800; letter-spacing:0.2px; }
    .brandTitle .t2{ font-size:12px; color:var(--muted); }

    .content{
      max-width: 1180px;
      margin: 0 auto;
      width: 100%;
      padding: 14px 12px calc(var(--nav-h) + var(--safe-bottom) + 14px);
    }

    .toastWrap{
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 80;
      display:flex;
      flex-direction:column;
      gap:10px;
      pointer-events:none;
      width: min(680px, calc(100% - 24px));
    }
    .toast{
      pointer-events:none;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 12px 14px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,0.14);
      box-shadow: 0 16px 50px rgba(0,0,0,0.45);
      opacity:0;
      transform: translateY(-10px);
      transition: opacity .2s ease, transform .2s ease;
    }
    .toast.show{ opacity:1; transform: translateY(0); }
    .toast.ok{ background: rgba(46,242,168,0.12); }
    .toast.err{ background: rgba(255,77,77,0.12); }
    .toast span{ color: var(--text); font-weight: 900; }

    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .card{
      border-radius: 22px;
      background: rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      box-shadow: 0 16px 50px rgba(0,0,0,0.45);
      overflow:hidden;
    }
    .card.dayCard{ overflow: visible; }

    .cardHeader{
      padding: 14px 14px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      border-radius: 24px 24px 0 0;
    }
    .cardHeader h2{
      margin:0;
      font-size: 14px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.68);
    }
    .cardBody{ padding: 12px 14px 14px; }

    .hr{ height:1px; background: rgba(255,255,255,0.08); margin: 0 0 12px; }

    .iconBtn{
      width:44px;height:44px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      cursor:pointer;
      display:grid;
      place-items:center;
      user-select:none;
      transition: transform 0.08s ease, background 0.2s ease;
      flex: 0 0 auto;
    }
    .iconBtn:active{ transform: scale(0.98); }
    .iconBtn[disabled]{ opacity:0.35; cursor:not-allowed; }

    .bubble{
      height: 64px;
      display:flex;
      align-items:center;
      gap:12px;
      padding: 12px 12px;
      border-radius: 22px;
      background: rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.10);
      white-space:nowrap;
      flex: 0 0 auto;
    }

    .dateBubble{
      min-width: 220px;
      justify-content:center;
    }
    .dateInput{
      width: 150px;
      height: 44px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      padding: 0 12px;
      outline:none;
      font: inherit;
      font-weight: 950;
      text-align:center;
      cursor:pointer;
      user-select:none;
    }

    .weightTitle{ display:flex; flex-direction:column; gap:4px; }
    .weightTitle .t1{ font-weight: 950; letter-spacing: .2px; white-space:nowrap; }
    .weightInputWrap{ display:flex; align-items:center; gap:10px; }
    .weightInput{
      width: 60px;
      height: 44px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      padding: 0 12px;
      outline:none;
      font: inherit;
      font-weight: 950;
      text-align:center;
      font-variant-numeric: tabular-nums;
    }
    .weightUnit{ color: rgba(255,255,255,0.68); font-weight: 800; user-select:none; white-space:nowrap; }

    .mealCard{
      border-radius: 22px;
      background: rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.10);
      overflow:hidden;
    }
    .mealTop{
      padding: 12px 12px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      cursor:pointer;
    }
    .mealTop:hover{ background: rgba(255,255,255,0.05); }
    .mealName{ font-weight: 950; font-size: 16px; letter-spacing: .2px; }

    .mealTopRight{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .signBtn{
      width:36px;
      height:36px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      cursor:pointer;
      display:grid;
      place-items:center;
      user-select:none;
      transition: transform 0.08s ease, background 0.2s ease, border-color 0.2s ease;
      font-weight: 980;
      line-height: 1;
      flex: 0 0 auto;
    }
    .signBtn:active{ transform: scale(0.98); }
    .signBtn[disabled]{ opacity:0.45; cursor:not-allowed; }

    .signBtn.signed{
      border-color: rgba(46,242,168,0.45);
      background: rgba(46,242,168,0.14);
    }
    .signBtn.derived{
      border-color: rgba(108,231,255,0.35);
      background: rgba(108,231,255,0.10);
      opacity: 0.7;
      cursor:not-allowed;
    }

    .collapseBtn{
      width:36px;
      height:36px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      cursor:pointer;
      display:grid;
      place-items:center;
      user-select:none;
      transition: transform .18s ease, background .2s ease;
      font-weight: 980;
      line-height: 1;
      flex: 0 0 auto;
    }
    .collapseBtn:active{ transform: scale(0.98); }

    .chartCard{
      border-radius: 22px;
      background: rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.10);
      overflow:hidden;
      padding: 12px;
    }

    .table{ width:100%; border-collapse: collapse; }
    .table th, .table td{
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 10px 10px;
      font-size: 13px;
      text-align:left;
    }
    .table th{
      color: rgba(255,255,255,0.68);
      font-weight: 900;
      letter-spacing: .2px;
      text-transform: uppercase;
      font-size: 11px;
      background: rgba(255,255,255,0.02);
      position: sticky;
      top: 0;
      z-index: 2;
      backdrop-filter: blur(8px);
    }
    .table th.num, .table td.num{ text-align:left; font-variant-numeric: tabular-nums; }

    .table td .cellInput{
      width:100%;
      height: 40px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.92);
      padding: 0 10px;
      outline:none;
      font: inherit;
      font-weight: 900;
      cursor: text;
    }
    .table td .cellInput[disabled]{ opacity:0.6; cursor:not-allowed; }
    .table td .cellInput:focus{
      border-color: rgba(108,231,255,0.35);
      box-shadow: 0 0 0 1px rgba(108,231,255,0.12);
    }

    .sumRow td{
      font-weight: 950;
      color: rgba(255,255,255,0.92);
      background: rgba(255,255,255,0.03);
    }

    .summaryStack{ display:flex; flex-direction:column; gap:10px; padding-top: 12px; }

    .view{ display:none; }
    .view.active{ display:block; }

    .nav{
      position: fixed;
      left:0; right:0; bottom:0;
      padding: 10px 12px calc(10px + var(--safe-bottom));
      background: rgba(7,10,16,0.58);
      backdrop-filter: blur(14px);
      border-top: 1px solid rgba(255,255,255,0.10);
      z-index: 30;
      height: 66px;
    }
    .navInner{
      max-width: 1180px;
      margin:0 auto;
      display:flex;
      justify-content:space-between;
      gap:10px;
    }
    .navBtn{
      flex:1;
      height: 46px;
      border-radius: 16px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.68);
      cursor:pointer;
      font: inherit;
      font-weight: 950;
      letter-spacing: .2px;
      transition: background .2s ease, color .2s ease, transform .08s ease;
    }
    .navBtn:active{ transform: scale(0.99); }
    .navBtn.active{
      color: rgba(0,0,0,0.90);
      border-color: rgba(108,231,255,0.30);
      background: linear-gradient(135deg, rgba(108,231,255,0.95), rgba(184,140,255,0.90));
    }

    .hidden{ display:none !important; }

    .errorCard{
      border-radius: 22px;
      background: rgba(255,77,77,0.10);
      border: 1px solid rgba(255,77,77,0.35);
      box-shadow: 0 16px 50px rgba(0,0,0,0.45);
      overflow: hidden;
    }
    .errorHead{
      padding: 14px 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
    }
    .errorHead .t{
      margin:0;
      font-size: 14px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      font-weight: 950;
    }
    .errorBody{
      height: 250px;
      padding: 12px 14px 14px;
      display:flex;
      flex-direction:column;
      gap: 10px;
    }
    .errorMsg{
      color: rgba(255,255,255,0.92);
      font-weight: 900;
      line-height: 1.35;
      white-space: pre-wrap;
    }
    .retryBtn{
      width: 100%;
      height: 46px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      cursor: pointer;
      font: inherit;
      font-weight: 950;
      letter-spacing: .2px;
      margin-top: auto;
      margin-bottom: 2px;
    }
    .retryBtn:active{ transform: scale(0.99); }

    .stickyPanel{
      position: sticky;
      top: 0;
      z-index: 15;
      background: rgba(11,16,32,0.86);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 22px;
      padding: 12px;
      box-shadow: 0 16px 50px rgba(0,0,0,0.45);
      margin-bottom: 12px;
      transition: border-radius .1s ease, box-shadow .1s ease, background .1s ease, border-color .1s ease;
      will-change: border-radius;
    }

    .stickyPanel.is-stuck{
      border-top-left-radius: 0;
      border-top-right-radius: 0;
      border-top-color: transparent;
    }

    .stickyPanel.noTrans{
      transition: none !important;
    }

    .dayHeaderRow{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:nowrap;
      overflow-x:auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .dayHeaderRow::-webkit-scrollbar{ display:none; }

    .dayHeaderLeft{ display:flex; align-items:center; gap:10px; flex: 0 0 auto; }
    .dayHeaderRight{
      display:flex;
      align-items:center;
      gap:10px;
      margin-left:auto;
      flex: 0 0 auto;
      justify-content:flex-end;
    }

    .sumBubble{
      height: 64px;
      padding: 10px 12px;
      border-radius: 22px;
      background: rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.10);
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:4px;
      min-width: 160px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.30);
    }
    .sumLine{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
      font-variant-numeric: tabular-nums;
      line-height:1.0;
    }
    .sumLine .k{
      font-size: 11px;
      color: rgba(255,255,255,0.68);
      text-transform: uppercase;
      letter-spacing: .35px;
      font-weight: 900;
    }
    .sumLine .v{
      font-size: 14px;
      font-weight: 980;
      color: rgba(255,255,255,0.92);
    }

    .sumBubble.ok{ border: 2px solid var(--ok-border); }
    .sumBubble.bad{ border: 2px solid var(--bad-border); }

    .fabDock{
      position: fixed;
      left: 0;
      right: 0;
      bottom: calc(66px + var(--safe-bottom) + 12px);
      z-index: 35;
      pointer-events: none;
    }
    .fabDockInner{
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 12px;
      display:flex;
      justify-content:flex-end;
    }
    .fabStack{
      display:flex;
      flex-direction:column;
      gap:10px;
      pointer-events: auto;
      align-items:flex-end;
      padding-right: 15px;
    }
    .fabBtn{
      height: 46px;
      min-width: 90px;
      width: auto;
      padding: 0 16px;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      font: inherit;
      font-weight: 980;
      letter-spacing: .2px;
      user-select:none;
      box-shadow: 0 18px 50px rgba(0,0,0,0.45);
      color: rgba(0,0,0,0.92);
      background: linear-gradient(135deg, rgba(46,242,168,0.95), rgba(108,231,255,0.90));
    }
    .fabBtn:active{ transform: scale(0.99); }

    @media (max-width: 900px){
      .dayHeaderRow{ flex-wrap: wrap; overflow-x: visible; }

      .dayHeaderLeft{
        order: 1;
        flex: 1 1 100%;
        width: 100%;
        justify-content: space-between;
      }

      #dateBubble{ flex: 0 0 auto; }
      #weightBubble{ flex: 0 0 auto; margin-left: auto; }

      .dayHeaderRight{
        order: 2;
        flex: 1 1 100%;
        width: 100%;
        margin-left: 0;
        justify-content: stretch;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .dayHeaderRight .sumBubble{
        width: 100%;
        min-width: 0;
      }
    }

    @media (max-width: 620px){
      .dayHeaderRight{ grid-template-columns: 1fr; }
    }

    @media (max-width: 560px){
      .dayHeaderLeft{
        flex-wrap: wrap;
        justify-content: flex-start;
      }

      #dateBubble{ flex: 1 1 100%; }

      #weightBubble{
        flex: 1 1 100%;
        justify-content: center;
      }

      #weightBubble .weightInputWrap{ justify-content: center; }
    }

    @media (max-width: 640px){
      .fabDockInner{ justify-content:flex-end; }
      .fabStack{ width:auto; align-items:flex-end; }
      .fabBtn{ width:auto; min-width:90px; }
    }

    .settingsGrid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    @media (max-width: 820px){
      .settingsGrid{ grid-template-columns: 1fr; }
    }

    .metric{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 14px;
      padding: 14px 14px;
      border-radius: 22px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .metricTitle{
      margin:0;
      color: rgba(255,255,255,0.68);
      font-weight: 900;
      letter-spacing: .35px;
      text-transform: uppercase;
      font-size: 11px;
      line-height: 1.1;
    }

    .metricValue{
      margin:0;
      font-weight: 980;
      font-size: 16px;
      color: rgba(255,255,255,0.92);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      text-align: right;
      min-width: 72px;
    }

    .mealBodyDay{
      overflow: hidden;
      max-height: 520px;
      transition: max-height .18s ease, opacity .18s ease;
      opacity: 1;
    }

    .mealBodyFoods{
      max-height: min(66vh, 520px);
      overflow: auto;
      transition: max-height .18s ease, opacity .18s ease;

  <script>
    const APP_BASE_PATH = "<!--APP_BASE_PATH-->";

    const $ = (q, el=document) => el.querySelector(q);
    const $$ = (q, el=document) => Array.from(el.querySelectorAll(q));

    let activeViewName = "Day";

    function toast(kind, msg){
      const wrap = $("#toastWrap");
      const div = document.createElement("div");
      div.className = `toast ${kind}`;
      div.innerHTML = `<span>${escapeHtml(msg)}</span>`;
      wrap.appendChild(div);
      requestAnimationFrame(() => div.classList.add("show"));
      setTimeout(() => {
        div.classList.remove("show");
        setTimeout(() => div.remove(), 250);
      }, 2400);
    }

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[m]));
    }

    function round2(n){
      return Math.round((n + Number.EPSILON) * 100) / 100;
    }

    function ddmmyyyyFromDateObj(d){
      const dd = String(d.getDate()).padStart(2,"0");
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const yyyy = String(d.getFullYear());
      return `${dd}${mm}${yyyy}`;
    }

    function dateInputFromDdmmyyyy(ddmmyyyy){
      const d = ddmmyyyy.slice(0,2);
      const m = ddmmyyyy.slice(2,4);
      const y = ddmmyyyy.slice(4,8);
      return `${d}/${m}/${y}`;
    }

    function parseDdmmyyyy(ddmmyyyy){
      const d = Number(ddmmyyyy.slice(0,2));
      const m = Number(ddmmyyyy.slice(2,4)) - 1;
      const y = Number(ddmmyyyy.slice(4,8));
      return new Date(y,m,d);
    }

    function todayDdmmyyyy(){
      const d = new Date();
      const dd = String(d.getDate()).padStart(2,"0");
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const yyyy = String(d.getFullYear());
      return `${dd}${mm}${yyyy}`;
    }

    function tomorrowDdmmyyyy(){
      const d = new Date();
      d.setDate(d.getDate() + 1);
      const dd = String(d.getDate()).padStart(2,"0");
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const yyyy = String(d.getFullYear());
      return `${dd}${mm}${yyyy}`;
    }

    function viewIds(viewName){
      return { ok: `#${viewName}Ok`, err: `#${viewName}Err` };
    }

    function clearViewError(viewName){
      const ids = viewIds(viewName);
      const ok = $(ids.ok);
      const err = $(ids.err);
      if (err){
        err.classList.add("hidden");
        err.innerHTML = "";
      }
      if (ok) ok.classList.remove("hidden");
    }

    function showViewError(viewName, title, msg, retryFn){
      const ids = viewIds(viewName);
      const ok = $(ids.ok);
      const err = $(ids.err);

      if (ok) ok.classList.add("hidden");
      if (!err) return;

      err.classList.remove("hidden");
      err.innerHTML = `
        <div class="grid">
          <div class="errorCard">
            <div class="errorHead">
              <div class="t">${escapeHtml(title || "Error")}</div>
            </div>
            <div class="errorBody">
              <div class="errorMsg">${escapeHtml(msg || "Failed")}</div>
              <button class="retryBtn" type="button" id="${viewName}RetryBtn">Retry</button>
            </div>
          </div>
        </div>
      `;

      const btn = $(`#${viewName}RetryBtn`);
      if (btn){
        btn.onclick = null;
        btn.onclick = () => retryFn && retryFn();
      }
    }

    function showErrorOnActiveView(title, msg, retryFn){
      showViewError(activeViewName, title, msg, retryFn);
    }

    function withTimeout(ms){
      const c = new AbortController();
      const t = setTimeout(() => c.abort(new Error("Request timeout")), ms);
      return { signal: c.signal, cancel: () => clearTimeout(t) };
    }

    async function fetchJson(path, { method="GET", body=null, timeoutMs=12000, signal=null } = {}){
      const t = withTimeout(timeoutMs);

      let mergedSignal = t.signal;
      if (signal){
        const ctrl = new AbortController();
        const onAbort = () => ctrl.abort(signal.reason || new Error("Aborted"));
        signal.addEventListener("abort", onAbort, { once:true });
        t.signal.addEventListener("abort", () => ctrl.abort(t.signal.reason), { once:true });
        mergedSignal = ctrl.signal;
      }

      try{
        const r = await fetch(APP_BASE_PATH + path, {
          method,
          headers:{ "Content-Type":"application/json" },
          body: body ? JSON.stringify(body) : null,
          signal: mergedSignal
        });

        const text = await r.text();
        let json = null;
        try { json = text ? JSON.parse(text) : null; }
        catch { throw new Error("Bad JSON from server"); }

        if (!r.ok){
          const msg = (json && json.errorMessage) ? json.errorMessage : `HTTP ${r.status}`;
          throw new Error(msg);
        }

        if (!json || typeof json !== "object"){
          throw new Error("Empty response from server");
        }

        if ("status" in json && json.status !== "SUCCESS"){
          throw new Error(json.errorMessage || "Server returned failure");
        }

        return json;
      } finally {
        t.cancel();
      }
    }

    async function apiGet(path){ return await fetchJson(path, { method:"GET" }); }
    async function apiPost(path, body){ return await fetchJson(path, { method:"POST", body }); }
    async function apiPut(path, body){ return await fetchJson(path, { method:"PUT", body }); }
    async function apiPatch(path, body){ return await fetchJson(path, { method:"PATCH", body }); }

    let foodsCombo = [];

    let vegetablesCombo = [];

    let groups = {};
    let settings = null;

    const ac = {
      menu: null,
      input: null,
      items: [],
      activeIndex: -1,
      lastRenderKey: "",
      closeTimer: null
    };

    function acInit(){
      ac.menu = $("#acMenu");
      document.addEventListener("mousedown", (e) => {
        if (!ac.menu) return;
        if (ac.menu.contains(e.target)) return;
        if (ac.input && ac.input.contains && ac.input.contains(e.target)) return;
        acHide();
      });
      window.addEventListener("resize", () => acReposition());
    }

    function acGetOptions(kind){
      if (kind === "FRUITS") return fruitsCombo;
      if (kind === "NUTS") return nutsCombo;
      if (kind === "VEGETABLES") return vegetablesCombo;
      return foodsCombo;
    }

    function acShowFor(input, kind, filterText){
      if (!ac.menu) return;
      ac.input = input;

      clearTimeout(ac.closeTimer);
      ac.closeTimer = null;

      const all = acGetOptions(kind);
      const q = String(filterText || "").trim().toUpperCase();

      let items = all;
      if (q){
        items = all.filter(x => String(x).toUpperCase().includes(q));
      }

      items = items.slice(0, 200);

      const key = kind + "|" + q + "|" + items.length;
      if (key !== ac.lastRenderKey){
        ac.lastRenderKey = key;
        ac.items = items;
        ac.activeIndex = items.length ? 0 : -1;

        ac.menu.innerHTML = items.length
          ? items.map((t, i) => `<div class="acItem ${i===0 ? "active":""}" data-i="${i}">${escapeHtml(t)}</div>`).join("")
          : `<div class="acItem" style="opacity:.65; cursor:default;">No matches</div>`;

        $$(".acItem[data-i]", ac.menu).forEach(el => {
          el.addEventListener("mouseenter", () => {
            const i = Number(el.dataset.i);
            acSetActive(i);
          });
          el.addEventListener("mousedown", (e) => {
            e.preventDefault();
            e.stopPropagation();
            const i = Number(el.dataset.i);
            acPick(i);
          });
        });
      }

      acReposition();
      ac.menu.style.display = "block";
    }

    function acReposition(){
      if (!ac.menu || !ac.input) return;
      if (ac.menu.style.display !== "block") return;

      const r = ac.input.getBoundingClientRect();
      const vw = window.innerWidth;
      const left = Math.max(8, Math.min(r.left, vw - 8 - r.width));

      ac.menu.style.left = left + "px";
      ac.menu.style.top = Math.min(window.innerHeight - 12, r.bottom + 6) + "px";
      ac.menu.style.width = Math.max(220, r.width) + "px";
    }

    function acHide(){
      if (!ac.menu) return;
      ac.menu.style.display = "none";
      ac.input = null;
      ac.items = [];
      ac.activeIndex = -1;
      ac.lastRenderKey = "";
    }

    function acSetActive(i){
      ac.activeIndex = i;
      $$(".acItem[data-i]", ac.menu).forEach(el => el.classList.toggle("active", Number(el.dataset.i) === i));

      const activeEl = $(`.acItem[data-i="${i}"]`, ac.menu);
      if (activeEl){
        const top = activeEl.offsetTop;
        const bottom = top + activeEl.offsetHeight;
        const viewTop = ac.menu.scrollTop;
        const viewBottom = viewTop + ac.menu.clientHeight;
        if (top < viewTop) ac.menu.scrollTop = top;
        else if (bottom > viewBottom) ac.menu.scrollTop = bottom - ac.menu.clientHeight;
      }
    }

    function acPick(i){
      if (!ac.input) return;
      if (i < 0 || i >= ac.items.length) return;

      ac.input.value = ac.items[i];
      ac.input.dispatchEvent(new Event("input", { bubbles:true }));
      ac.input.dispatchEvent(new Event("change", { bubbles:true }));
      acHide();
    }

    function attachAutocomplete(input, kind){
      if (!input) return;
      if (input.__acBound) return;
      input.__acBound = true;

      input.addEventListener("focus", () => {
        if (input.disabled) return;
        clearTimeout(ac.closeTimer);
        ac.closeTimer = null;
        acShowFor(input, kind, input.value);
      });

      input.addEventListener("click", () => {
        if (input.disabled) return;
        clearTimeout(ac.closeTimer);
        ac.closeTimer = null;
        acShowFor(input, kind, input.value);
      });

      input.addEventListener("input", () => {
        if (input.disabled) return;
        acShowFor(input, kind, input.value);
      });

      input.addEventListener("keydown", (e) => {
        if (!ac.menu || ac.menu.style.display !== "block") return;

        if (e.key === "ArrowDown"){
          e.preventDefault();
          if (ac.items.length) acSetActive(Math.min(ac.items.length - 1, ac.activeIndex + 1));
        } else if (e.key === "ArrowUp"){
          e.preventDefault();
          if (ac.items.length) acSetActive(Math.max(0, ac.activeIndex - 1));
        } else if (e.key === "Enter"){
          if (ac.activeIndex >= 0){
            e.preventDefault();
            acPick(ac.activeIndex);
          }
        } else if (e.key === "Escape"){
          e.preventDefault();
          acHide();
        }
      });

      input.addEventListener("blur", () => {
        clearTimeout(ac.closeTimer);
        ac.closeTimer = setTimeout(() => acHide(), 120);
      });
    }

    function snapshotMealCollapse(){
      const m = {};
      $$("#viewDay .mealCard").forEach(card => {

    function wireCollapse(card){
      const btn = card.querySelector("[data-collapse-btn]");
      const header = card.querySelector(".mealTop");
      const body = card.querySelector(".mealBodyDay, .mealBodyFoods");
      if (!header || !body) return;

      function sync(){
        const collapsed = card.classList.contains("collapsed");
        if (btn){
          btn.textContent = collapsed ? "▸" : "▾";
          btn.setAttribute("aria-label", collapsed ? "Expand" : "Collapse");
        }
      }

      function toggle(){
        card.classList.add("animating");
        card.classList.toggle("collapsed");
        sync();

        const done = () => {
          card.classList.remove("animating");
          body.removeEventListener("transitionend", done);
          requestAnimationFrame(() => forceResponsiveReflow());
        };
        body.addEventListener("transitionend", done);
      }

      header.addEventListener("click", (e) => {
        if (e.target && e.target.closest && e.target.closest("[data-collapse-btn]")) return;
        if (e.target && e.target.closest && e.target.closest("[data-sign-btn]")) return;
        toggle();
      });

      if (btn){
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          toggle();
        });
      }

      const init = card.dataset.initCollapsed;
      if (init === "1") card.classList.add("collapsed");
      if (init === "0") card.classList.remove("collapsed");
      sync();
    }

    function initOrUpdateDatePicker(){
      if (!startDateObj || !openDayObj || !currentDayDdmmyyyy) return;

      const currentObj = parseDdmmyyyy(currentDayDdmmyyyy);
      if (!fp){
        fp = flatpickr("#dateInput", {
          dateFormat: "d/m/Y",
          defaultDate: currentObj,

          minDate: startDateObj,
          maxDate: openDayObj,
          disableMobile: true,
          clickOpens: false,
          allowInput: false,
          monthSelectorType: "dropdown",
          appendTo: document.body,
          position: "below left",

          onReady: (selectedDates, dateStr, inst) => {
            $("#dateInput").value = dateInputFromDdmmyyyy(currentDayDdmmyyyy);

            const yearInput = inst.calendarContainer.querySelector(".cur-year");
            if (yearInput) {
              yearInput.setAttribute("readonly", "readonly");
              yearInput.setAttribute("inputmode", "none");
              yearInput.style.pointerEvents = "none";
              yearInput.style.userSelect = "none";
              yearInput.tabIndex = -1;
            }

            const scroller = $("#contentScroll");
            let rafPending = false;

            scroller.addEventListener("scroll", () => {
              if (!inst.isOpen) return;
              if (rafPending) return;
              rafPending = true;
              requestAnimationFrame(() => {
                rafPending = false;
                inst._positionCalendar();
              });
            }, { passive: true });

            function syncYearArrows(){
              const wrap = inst.calendarContainer.querySelector(".numInputWrapper");
              if (!wrap) return;
              const up = wrap.querySelector(".arrowUp");
              const down = wrap.querySelector(".arrowDown");
              const y = inst.currentYear;

              const minY = inst.config.minDate ? inst.config.minDate.getFullYear() : null;
              const maxY = inst.config.maxDate ? inst.config.maxDate.getFullYear() : null;

              const canDown = (minY == null) ? true : (y > minY);
              const canUp   = (maxY == null) ? true : (y < maxY);

              if (down){
                down.classList.toggle("fp-hide", !canDown);
                down.style.pointerEvents = canDown ? "auto" : "none";
              }
              if (up){
                up.classList.toggle("fp-hide", !canUp);
                up.style.pointerEvents = canUp ? "auto" : "none";
              }
            }

            syncYearArrows();
            inst.config.onYearChange.push(syncYearArrows);
            inst.config.onMonthChange.push(syncYearArrows);
            inst.config.onOpen.push(syncYearArrows);
          },

          onChange: async (selectedDates) => {
            if (!selectedDates?.length) return;
            const ddmmyyyy = ddmmyyyyFromDateObj(selectedDates[0]);
            if (ddmmyyyy === currentDayDdmmyyyy) return;
            await loadDayByDate(ddmmyyyy);
          }
        });

        const dateInputEl = $("#dateInput");
        dateInputEl.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();

          if (!fp) return;
          if (fp.isOpen) fp.close();
          else fp.open();
        });

        $("#dayBack").addEventListener("click", async (e) => {
          e.stopPropagation();
          e.preventDefault();

          const d = parseDdmmyyyy(currentDayDdmmyyyy);
          d.setDate(d.getDate() - 1);
          if (d.getTime() < startDateObj.getTime()) return;

          const ddmmyyyy = ddmmyyyyFromDateObj(d);
          await loadDayByDate(ddmmyyyy);
        });

        $("#dayForward").addEventListener("click", async (e) => {
          e.stopPropagation();
          e.preventDefault();

          const d = parseDdmmyyyy(currentDayDdmmyyyy);
          d.setDate(d.getDate() + 1);
          if (d.getTime() > openDayObj.getTime()) return;

          const ddmmyyyy = ddmmyyyyFromDateObj(d);
          await loadDayByDate(ddmmyyyy);
        });
      }else{
        fp.set("minDate", startDateObj);
        fp.set("maxDate", openDayObj);
        fp.setDate(currentObj);
      }

      $("#dateInput").value = dateInputFromDdmmyyyy(currentDayDdmmyyyy);

    function rebuildCombosFromFoods(f){
      foodsMap = {};
      foodsCombo = [];
      fruitsCombo = [];
      nutsCombo = [];
      vegetablesCombo = [];

      f.foods.forEach(food => {
        foodsMap[food.name.toUpperCase()] = {
          protein: Number(food.protein),
          fat: Number(food.fat),
          calories: Number(food.calories),
          type: food.type,
          innerType: food.inner_type || "",
          available: food.available || ""
        };
        foodsCombo.push(food.name);

        if (food.inner_type ){
          if (food.inner_type === "Fruits") fruitsCombo.push(food.name);
          if (food.inner_type === "Nuts") nutsCombo.push(food.name);
          if (food.inner_type === "Vegetables") vegetablesCombo.push(food.name);
        }
      });

      Object.keys(groups).forEach(g => foodsCombo.push(g[0] + g.slice(1).toLowerCase()));

      foodsCombo.sort((a,b)=>a.localeCompare(b));
      fruitsCombo.sort((a,b)=>a.localeCompare(b));
      nutsCombo.sort((a,b)=>a.localeCompare(b));
      vegetablesCombo.sort((a,b)=>a.localeCompare(b));
    }

    function calcFoodValue(name, key, weight){
      const f = foodsMap[name.toUpperCase()];
      if (!f) return "";
      return (Number(f[key]) * Number(weight)) / 100;
    }

    function isMealRowEmpty(tr){
      const name = $("td:nth-child(1) input", tr).value.trim();
      const weight = $("td:nth-child(2) input", tr).value.trim();
      const p = $("td:nth-child(3) input", tr).value.trim();
      const f = $("td:nth-child(4) input", tr).value.trim();
      const c = $("td:nth-child(5) input", tr).value.trim();
      return !name && !weight && !p && !f && !c;
    }

    function ensureTrailingEmptyRowsForMeal(tbody, buildRowFn){
      const rows = $$("tr", tbody).filter(tr => !tr.classList.contains("sumRow"));
      const empties = rows.filter(isMealRowEmpty);

      while (empties.length > 1){
        empties.pop().remove();
      }

      const hasEmpty = $$("tr", tbody)
        .filter(tr => !tr.classList.contains("sumRow"))
        .some(isMealRowEmpty);

      if (!hasEmpty){
        const sumRow = $("tr.sumRow", tbody);
        const newTr = buildRowFn();
        if (sumRow) tbody.insertBefore(newTr, sumRow);
        else tbody.appendChild(newTr);
      }
    }

    function enforceMax5Rows(tbody){
      const rows = $$("tr", tbody).filter(tr => !tr.classList.contains("sumRow"));
      let empties = rows.filter(isMealRowEmpty);

      while (empties.length > 1){
        empties.pop().remove();
        empties = $$("tr", tbody).filter(tr => !tr.classList.contains("sumRow") && isMealRowEmpty(tr));
      }

      let allRows = $$("tr", tbody).filter(tr => !tr.classList.contains("sumRow"));
      while (allRows.length > 5){
        const last = allRows[allRows.length - 1];
        if (isMealRowEmpty(last)){
          last.remove();
          allRows = $$("tr", tbody).filter(tr => !tr.classList.contains("sumRow"));
        }else{
          break;
        }
      }

      const nonEmptyNow = $$("tr", tbody).filter(tr => !tr.classList.contains("sumRow") && !isMealRowEmpty(tr));
      const emptyNow = $$("tr", tbody).filter(tr => !tr.classList.contains("sumRow") && isMealRowEmpty(tr));

      if (nonEmptyNow.length <= 4 && emptyNow.length === 0){
        const sumRow = $("tr.sumRow", tbody);
        const empty = tbody.__buildRowEmpty ? tbody.__buildRowEmpty() : null;
        if (empty && sumRow) tbody.insertBefore(empty, sumRow);
      }
    }

    function mealCardByName(name){
      return $(`.mealCard[data-meal="${CSS.escape(name)}"]`);
    }

    function computeDerivedLockedGroups(day){
      const locked = new Set();
      if (!day || !Array.isArray(day.meals)) return locked;

      day.meals.forEach(meal => {
        const mealNameUpper = (meal.name || "").toUpperCase();
        const isGroupMeal = (mealNameUpper in groups);
        const signed = !!meal.meal_closed;
        if (!signed) return;
        if (isGroupMeal) return;

        (meal.foods || []).forEach(f => {
          const n = (f.name || "").toUpperCase();
          if (n in groups) locked.add(n);
        });
      });

      return locked;
    }

    function sumMeal(mealName){
      const card = mealCardByName(mealName);
      if (!card) return {protein:0,fat:0,calories:0,hasAny:false};

      const rows = $$("tbody tr", card).filter(tr => !tr.classList.contains("sumRow"));
      let p=0,f=0,c=0;
      let hasAny = false;

      rows.forEach(tr => {
        const name = $("td:nth-child(1) input", tr).value.trim();
        const w = $("td:nth-child(2) input", tr).value.trim();
        const pv = $("td:nth-child(3) input", tr).value.trim();
        const fv = $("td:nth-child(4) input", tr).value.trim();
        const cv = $("td:nth-child(5) input", tr).value.trim();

        if (name && (w || (name.toUpperCase() in groups))) hasAny = true;
        if (pv !== "") p += Number(pv);
        if (fv !== "") f += Number(fv);
        if (cv !== "") c += Number(cv);
      });

      p = round2(p); f = round2(f); c = round2(c);

      const footer = $("tr.sumRow", card);
      footer.querySelector("[data-sum='p']").textContent = p;
      footer.querySelector("[data-sum='f']").textContent = f;
      footer.querySelector("[data-sum='c']").textContent = c;

      return {protein:p, fat:f, calories:c,hasAny};
    }

    function groupMealNameFromUpper(groupUpper){
      return groupUpper[0] + groupUpper.slice(1).toLowerCase();
    }

    function getGroupTotals(groupUpper){
      const mealName = groupMealNameFromUpper(groupUpper);
      const sums = sumMeal(mealName);
      const hasAny = sums.hasAny;
      const defaultCalories = Number(groups[groupUpper] || 0);

      return {
        protein: round2(sums.protein),
        fat: round2(sums.fat),
        calories: round2(hasAny ? sums.calories : defaultCalories),
        hasAny
      };
    }

    function propagateGroupRow(groupUpper, p, f, c){
      $$(".mealCard tbody tr").forEach(tr => {
        if (tr.classList.contains("sumRow")) return;
        const nameInput = $("td:nth-child(1) input", tr);
        if (!nameInput) return;
        if (nameInput.value.trim().toUpperCase() !== groupUpper) return;

        const card = tr.closest(".mealCard");
        const mealName = card.dataset.meal || "";

        const isLocked = card.dataset.locked === "1";
        if (isLocked) return;

        const wInput = $("td:nth-child(2) input", tr);
        const pInput = $("td:nth-child(3) input", tr);
        const fInput = $("td:nth-child(4) input", tr);
        const cInput = $("td:nth-child(5) input", tr);

        wInput.value = "";
        wInput.disabled = true;
        pInput.value = p;
        fInput.value = f;
        cInput.value = c;

        sumMeal(mealName);

        const tbody = tr.closest("tbody");
        ensureTrailingEmptyRowsForMeal(tbody, () => {
          const empty = document.createElement("tr");
          empty.innerHTML = `
            <td><input class="cellInput" value="" /></td>
            <td class="num"><input class="cellInput" inputmode="decimal" value="" placeholder="" /></td>
            <td class="num"><input class="cellInput" disabled value="" /></td>
            <td class="num"><input class="cellInput" disabled value="" /></td>
            <td class="num"><input class="cellInput" disabled value="" /></td>
          `;
          return empty;
        });

        enforceMax5Rows(tbody);
      });
    }

    function updateGroupMealTotals(groupMealUpper){
      const gt = getGroupTotals(groupMealUpper);
      propagateGroupRow(groupMealUpper, gt.protein, gt.fat, gt.calories);
    }

    function computeNeeded(){
      const weight = Number($("#weightInput").value || 0);
      const proteinNeeded = Number(settings.daily.protein) * weight;

      const bd = parseDdmmyyyy(settings.person.birth_day);
      const cur = parseDdmmyyyy(currentDayDdmmyyyy);
      const age = Math.floor((cur.getTime() - bd.getTime()) / (365.2425 * 24 * 3600 * 1000));

      const caloriesNeeded =
        (10 * weight + 6.25 * Number(settings.person.height) - 5 * age + 5) *
        Number(settings.daily.tdee_multiplier) -
        Number(settings.daily.calories);

      const fatCaloriesNeeded = caloriesNeeded * Number(settings.daily.fat);

      return {
        proteinNeeded: round2(proteinNeeded),
        caloriesNeeded: round2(caloriesNeeded),
        fatCaloriesNeeded: round2(fatCaloriesNeeded)
      };
    }

    function setMiniState(el, ok){
      el.classList.remove("ok","bad");
      el.classList.add(ok ? "ok" : "bad");
    }

    function computeAllTotals(){
      let totalProtein = 0;
      let totalFat = 0;
      let totalCalories = 0;

      $$("#viewDay .mealCard").forEach(card => {
        const mealName = card.dataset.meal.toUpperCase();
        if (mealName in groups) return;

        const footer = $("tr.sumRow", card);
        totalProtein += Number(footer.querySelector("[data-sum='p']").textContent || 0);
        totalFat += Number(footer.querySelector("[data-sum='f']").textContent || 0);
        totalCalories += Number(footer.querySelector("[data-sum='c']").textContent || 0);
      });

      totalProtein = round2(totalProtein);
      totalFat = round2(totalFat);
      totalCalories = round2(totalCalories);
      const fatCalories = round2(totalFat * 9);

      $("#sumProtein").textContent = totalProtein;
      $("#sumFatCal").textContent = fatCalories;
      $("#sumCalories").textContent = totalCalories;

      const need = computeNeeded();
      $("#needProtein").textContent = need.proteinNeeded;
      $("#needFatCal").textContent = need.fatCaloriesNeeded;
      $("#needCalories").textContent = need.caloriesNeeded;

      const leftProtein = round2(need.proteinNeeded - totalProtein);
      const leftFat = round2(need.fatCaloriesNeeded - fatCalories);
      const leftCalories = round2(need.caloriesNeeded - totalCalories);

      $("#leftProtein").textContent = leftProtein;
      $("#leftFatCal").textContent = leftFat;
      $("#leftCalories").textContent = leftCalories;

      setMiniState($("#miniProtein"), leftProtein <= 0);
      setMiniState($("#miniFat"), leftFat >= 0);
      setMiniState($("#miniCalories"), leftCalories >= 0);
    }

    function collectUiDraftDay(){
      const weight = Number($("#weightInput").value || 0);

      const meals = [];
      $$("#viewDay .mealCard").forEach(card => {
        const mealName = card.dataset.meal;

        const foods = [];
        const rows = $$("tbody tr", card).filter(tr => !tr.classList.contains("sumRow"));

        rows.forEach(tr => {
          const name = $("td:nth-child(1) input", tr).value.trim();
          const w = $("td:nth-child(2) input", tr).value.trim();
          const p = $("td:nth-child(3) input", tr).value.trim();
          const f = $("td:nth-child(4) input", tr).value.trim();
          const c = $("td:nth-child(5) input", tr).value.trim();

          if (!name) return;

          const up = name.toUpperCase();
          if (!(up in foodsMap) && !(up in groups)){
            throw new Error("Food Doesn't Exist: " + name);
          }

          if (w === "" && !(up in groups)) return;

          foods.push({ name, weight: w, protein: p, fat: f, calories: c });
        });

        meals.push({
          name: mealName,
          foods,
          meal_closed: !!mealClosedState[mealName]
        });
      });

      const draft = {
        date: currentDayDdmmyyyy,
        day_closed: !!currentDayDayClosed,
        weight,
        meals
      };

      if (draft.day_closed){
        draft.meals.forEach(m => { m.meal_closed = true; });
        return draft;
      }

      const derivedLocked = computeDerivedLockedGroups(draft);

      draft.meals.forEach(m => {
        const upMeal = String(m.name || "").toUpperCase();

        if (upMeal in groups){
          m.meal_closed = derivedLocked.has(upMeal);
        } else {
          m.meal_closed = !!mealClosedState[m.name];
        }
      });

      return draft;
    }

    function collectDayPayload(){
      const d = collectUiDraftDay();
      return { weight: d.weight, meals: d.meals };
    }

    function computeGroupsInMealFromDraft(draftDay, mealName){
      const s = new Set();
      const m = (draftDay.meals || []).find(x => (x.name || "") === mealName);
      if (!m || !Array.isArray(m.foods)) return s;
      m.foods.forEach(f => {
        const up = String(f?.name || "").trim().toUpperCase();
        if (up && (up in groups)) s.add(up);
      });
      return s;
    }

    function collapseAfterSign(draftDay, mealName){
      if (mealUiState.date !== currentDayDdmmyyyy){
        mealUiState = { date: currentDayDdmmyyyy, collapsed: {} };
      }

      mealUiState.collapsed[mealName] = true;

      const derived = computeDerivedLockedGroups(draftDay);
      (draftDay.meals || []).forEach(m => {
        const up = (m.name || "").toUpperCase();
        if (up in groups && derived.has(up)){
          mealUiState.collapsed[m.name] = true;
        }
      });
    }

    function buildMealsUI(day){
      const wrap = $("#mealsWrap");
      wrap.innerHTML = "";

      const dayClosed = !!day.day_closed;
      const derivedLockedGroups = computeDerivedLockedGroups(day);

      day.meals.forEach(meal => {
        const mealNameUpper = (meal.name || "").toUpperCase();
        const isGroupMeal = (mealNameUpper in groups);

        const signed = !!meal.meal_closed;
        const derivedLocked = isGroupMeal && derivedLockedGroups.has(mealNameUpper);

        const locked = dayClosed || signed || derivedLocked;
        const canToggleSign = !dayClosed && !isGroupMeal;

        const card = document.createElement("div");
        card.className = "mealCard";
        card.dataset.meal = meal.name;
        card.dataset.locked = locked ? "1" : "0";

        const header = document.createElement("div");
        header.className = "mealTop";

        const signBtnHtml = (() => {
          if (dayClosed) return "";
          if (!isGroupMeal){
            if (signed){
              return `<button class="signBtn signed" type="button" data-sign-btn title="Unsign">✓</button>`;
            }
            return `<button class="signBtn" type="button" data-sign-btn title="Sign">✓</button>`;
          }
          if (derivedLocked){
            return `<button class="signBtn derived" type="button" data-sign-btn disabled title="Locked by signed meal">✓</button>`;
          }
          return `<button class="signBtn" type="button" data-sign-btn disabled title="Group meal cannot be signed">✓</button>`;
        })();

        header.innerHTML = `
          <div class="mealName">${escapeHtml(meal.name)}</div>
          <div class="mealTopRight">
            ${signBtnHtml}
            <button class="collapseBtn" type="button" data-collapse-btn>▾</button>
          </div>
        `;

        const body = document.createElement("div");
        body.className = "mealBodyDay";

        const table = document.createElement("table");
        table.className = "table";
        table.innerHTML = `
          <thead>
            <tr>
              <th style="width:38%">Name</th>
              <th class="num" style="width:16%;">Weight</th>
              <th class="num" style="width:15%;">Protein</th>
              <th class="num" style="width:13%;">Fat</th>
              <th class="num" style="width:18%;">Calories</th>
            </tr>
          </thead>
          <tbody></tbody>
        `;

        const tbody = $("tbody", table);

        function buildRow(food){
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>
              <input class="cellInput" ${locked ? "disabled" : ""} value="${escapeHtml(food?.name || "")}" placeholder="" />
            </td>
            <td class="num">
              <input class="cellInput" ${locked ? "disabled" : ""} inputmode="decimal"
                value="${escapeHtml(food?.weight || "")}" placeholder="" />
            </td>
            <td class="num"><input class="cellInput" disabled value="${escapeHtml(food?.protein ?? "")}" /></td>
            <td class="num"><input class="cellInput" disabled value="${escapeHtml(food?.fat ?? "")}" /></td>
            <td class="num"><input class="cellInput" disabled value="${escapeHtml(food?.calories ?? "")}" /></td>
          `;

          const nameInput = $("td:nth-child(1) input", tr);
          const wInput = $("td:nth-child(2) input", tr);
          const pInput = $("td:nth-child(3) input", tr);
          const fInput = $("td:nth-child(4) input", tr);
          const cInput = $("td:nth-child(5) input", tr);

          const kind = (() => {
            if (!isGroupMeal) return "FOODS";
            if (mealNameUpper === "FRUITS") return "FRUITS";
            if (mealNameUpper === "NUTS") return "NUTS";
            if (mealNameUpper === "VEGETABLES") return "VEGETABLES";
            return "FOODS";
          })();

          attachAutocomplete(nameInput, kind);

          const initialName = (nameInput.value || "").trim().toUpperCase();
          if (initialName in groups){
            wInput.value = "";
            wInput.disabled = true;
          }

          function ensureTrailingAndMax5(){
            if (locked) return;
            ensureTrailingEmptyRowsForMeal(tbody, () => buildRow(null));
            enforceMax5Rows(tbody);
          }

          function updateRowNutrition(){
            if (locked) return;

            const name = (nameInput.value || "").trim();
            const up = name.toUpperCase();
            const weight = (wInput.value || "").trim();

            ensureTrailingAndMax5();

            if (up in groups){
              wInput.value = "";
              wInput.disabled = true;

              const gt = getGroupTotals(up);
              pInput.value = gt.protein;
              fInput.value = gt.fat;
              cInput.value = gt.calories;

              sumMeal(meal.name);
              computeAllTotals();
              ensureTrailingAndMax5();
              return;
            }

            wInput.disabled = false;

            if (!name){
              pInput.value = ""; fInput.value = ""; cInput.value = "";
              sumMeal(meal.name);
              computeAllTotals();
              ensureTrailingAndMax5();
              return;
            }

            if (!(up in foodsMap)){
              pInput.value = ""; fInput.value = ""; cInput.value = "";
              sumMeal(meal.name);
              computeAllTotals();
              ensureTrailingAndMax5();
              return;
            }

            if (weight && !isNaN(Number(weight))){
              pInput.value = round2(calcFoodValue(name, "protein", weight));
              fInput.value = round2(calcFoodValue(name, "fat", weight));
              cInput.value = round2(calcFoodValue(name, "calories", weight));
            }else{
              pInput.value = ""; fInput.value = ""; cInput.value = "";
            }

            if (mealNameUpper in groups){
              updateGroupMealTotals(mealNameUpper);
            }

            sumMeal(meal.name);
            computeAllTotals();
            ensureTrailingAndMax5();
          }

          if (!locked){
            nameInput.addEventListener("input", updateRowNutrition);
            nameInput.addEventListener("change", updateRowNutrition);
            nameInput.addEventListener("blur", updateRowNutrition);
            wInput.addEventListener("input", updateRowNutrition);
          }

          return tr;
        }

        tbody.__buildRowEmpty = () => buildRow(null);

        const foods = Array.isArray(meal.foods) ? meal.foods : [];
        foods.forEach(f => tbody.appendChild(buildRow(f)));

        if (!locked) tbody.appendChild(buildRow(null));

        const tfoot = document.createElement("tr");
        tfoot.className = "sumRow";
        tfoot.innerHTML = `
          <td>Sum</td>
          <td class="num"></td>
          <td class="num" data-sum="p">0</td>
          <td class="num" data-sum="f">0</td>
          <td class="num" data-sum="c">0</td>
        `;
        tbody.appendChild(tfoot);

        body.appendChild(table);
        card.appendChild(header);
        card.appendChild(body);
        wrap.appendChild(card);

        card.dataset.initCollapsed = dayClosed ? "0" : (initialCollapsedForMeal(meal.name, locked) ? "1" : "0");
        wireCollapse(card);

        const signBtn = card.querySelector("[data-sign-btn]");
        if (signBtn && canToggleSign){
          signBtn.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();

            try{
              snapshotMealCollapse();

              const draftBefore = collectUiDraftDay();
              const cur = !!mealClosedState[meal.name];
              const next = !cur;

              const groupsInThisMeal = computeGroupsInMealFromDraft(draftBefore, meal.name);

              mealClosedState[meal.name] = next;

              if (mealUiState.date !== currentDayDdmmyyyy){
                mealUiState = { date: currentDayDdmmyyyy, collapsed: {} };
              }

              if (next){
                const draftAfter = JSON.parse(JSON.stringify(draftBefore));
                (draftAfter.meals || []).forEach(m => {
                  const isThis = (m.name === meal.name);
                  const upMeal = String(m.name || "").toUpperCase();

                  if (upMeal in groups){
                    m.meal_closed = false;
                  } else {
                    m.meal_closed = isThis ? true : !!mealClosedState[m.name];
                  }
                });

                collapseAfterSign(draftAfter, meal.name);
              } else {
                mealUiState.collapsed[meal.name] = false;

                const draftAfter = JSON.parse(JSON.stringify(draftBefore));
                (draftAfter.meals || []).forEach(m => {
                  m.meal_closed = !!mealClosedState[m.name];
                });

                const derivedNow = computeDerivedLockedGroups(draftAfter);
                groupsInThisMeal.forEach(groupUpper => {
                  if (!derivedNow.has(groupUpper)){
                    const groupMealName = groupMealNameFromUpper(groupUpper);
                    mealUiState.collapsed[groupMealName] = false;
                  }
                });
              }

              const draftRender = JSON.parse(JSON.stringify(draftBefore));
              (draftRender.meals || []).forEach(m => {
                m.meal_closed = !!mealClosedState[m.name];
              });

              renderDay(draftRender);
            }catch(err){
              toast("err", err.message || "Failed");
            }
          });
        }

        sumMeal(meal.name);
        if (!locked) {
          ensureTrailingEmptyRowsForMeal(tbody, () => buildRow(null));
          enforceMax5Rows(tbody);
        }
      });

      computeAllTotals();
    }

    async function loadWeights(){
      clearViewError("Weights");

      try{
        const r = await apiGet("weights");

        const days = r.days || [];
        const weights = [];
        const start = startDateObj;

        const dayCount = Math.floor((openDayObj.getTime() - start.getTime()) / (1000*3600*24)) + 1;
        const weeks = Math.ceil(dayCount / 7);

        const avgSum = Array(weeks).fill(0);
        const avgCnt = Array(weeks).fill(0);
        const reduction = Array(weeks).fill(null);

        days.forEach(d => {
          if (Number(d.weight) !== 0){
            const dt = parseDdmmyyyy(d.date);
            weights.push({ label: dateInputFromDdmmyyyy(d.date), y: Number(d.weight), dt });

            const pos = Math.floor((dt.getTime() - start.getTime()) / (1000*3600*24) / 7);
            avgSum[pos] += Number(d.weight);
            avgCnt[pos] += 1;

            if (dt.getDay() % 7 === 0){
              reduction[pos] = Number(d.weight);
            }
          }
        });

        const dailyLabels = weights.map(w => w.label);
        const dailyData = weights.map(w => w.y);

        const weeklyAvgLabels = [];
        const weeklyAvgData = [];
        for (let i=0;i<weeks;i++){
          if (avgCnt[i] > 0){
            weeklyAvgLabels.push(String(i+1));
            weeklyAvgData.push(round2(avgSum[i]/avgCnt[i]));
          }
        }

        const weeklyRedLabels = [];
        const weeklyRedData = [];
        for (let i=1;i<weeks;i++){
          if (reduction[i-1] != null && reduction[i] != null){
            weeklyRedLabels.push(String(i));
            weeklyRedData.push(round2(reduction[i-1] - reduction[i]));
          }
        }

        // Create once, otherwise update in-place
        if (!chartDaily){
          chartDaily = new Chart($("#chartDaily"), {
            type: "line",
            data: { labels: dailyLabels, datasets: [{ label:"Weight", data: dailyData, pointRadius:3, tension:0.25 }] },
            options: { responsive:true, scales:{ y:{ title:{ display:true, text:"Weight" } } } }
          });
        } else {
          chartDaily.data.labels = dailyLabels;
          chartDaily.data.datasets[0].data = dailyData;
          chartDaily.update();
        }

        if (!chartWeeklyAvg){
          chartWeeklyAvg = new Chart($("#chartWeeklyAvg"), {
            type: "line",
            data: { labels: weeklyAvgLabels, datasets: [{ label:"Weekly Average", data: weeklyAvgData, pointRadius:3, tension:0.25 }] },
            options: { responsive:true, scales:{ y:{ title:{ display:true, text:"Weight" } } } }
          });
        } else {
          chartWeeklyAvg.data.labels = weeklyAvgLabels;
          chartWeeklyAvg.data.datasets[0].data = weeklyAvgData;
          chartWeeklyAvg.update();
        }

        if (!chartWeeklyRed){
          chartWeeklyRed = new Chart($("#chartWeeklyReduction"), {
            type: "bar",
            data: { labels: weeklyRedLabels, datasets: [{ label:"Weekly Reduction", data: weeklyRedData }] },
            options: { responsive:true, scales:{ y:{ title:{ display:true, text:"Reduction" } } } }
          });
        } else {
          chartWeeklyRed.data.labels = weeklyRedLabels;
          chartWeeklyRed.data.datasets[0].data = weeklyRedData;
          chartWeeklyRed.update();
        }

        forceResponsiveReflow();
        clearViewError("Weights");
      }catch(e){
        const msg = e.message || "Weights failed";
        toast("err", msg);
        showViewError("Weights", "Weights", msg, () => loadWeights());
      }
    }

    }

    function syncStickyNowNoAnim(){
      const panel = document.getElementById("dayStickyPanel");
      const scroller = document.getElementById("contentScroll");
      if (!panel || !scroller) return;

      panel.classList.add("noTrans");

      const stuck = scroller.scrollTop > 0;
      panel.classList.toggle("is-stuck", stuck);

      panel.offsetHeight;
      requestAnimationFrame(() => panel.classList.remove("noTrans"));
    }

    function wireUI(){
      $$(".navBtn").forEach(btn => {
        btn.addEventListener("click", async () => setActiveView(btn.dataset.view));
      });

      $("#saveDayBtn").addEventListener("click", async () => saveDay());
      $("#endBtn").addEventListener("click", async () => endDay());
      $("#saveFoodsBtn").addEventListener("click", async () => saveFoods());
      $("#revertBtn").addEventListener("click", async () => revertDay());

      $("#weightInput").addEventListener("input", () => computeAllTotals());

      let reflowTimer = null;
      window.addEventListener("resize", () => {
        clearTimeout(reflowTimer);
        reflowTimer = setTimeout(forceResponsiveReflow, 50);
      }, { passive:true });

      window.addEventListener("orientationchange", () => forceResponsiveReflow(), { passive:true });
    }

    async function boot(){
      try{
        acInit();
        wireUI();

        window.addEventListener("unhandledrejection", (ev) => {
          const msg = ev?.reason?.message || String(ev?.reason || "Unexpected error");
          toast("err", msg);
          showErrorOnActiveView("Error", msg, () => boot());
        });

        window.addEventListener("error", (ev) => {
          const msg = ev?.error?.message || ev?.message || "Unexpected error";
          toast("err", msg);
          showErrorOnActiveView("Error", msg, () => boot());
        });

        await loadSettings();
        await loadFoods();
        await loadOpenDay();

        function initStickyStuckClass(){
          const panel = document.getElementById("dayStickyPanel");
          const scroller = document.getElementById("contentScroll");
          if (!panel || !scroller) return;

          if (!stickySentinel){
            stickySentinel = document.createElement("div");
            stickySentinel.style.position = "relative";
            stickySentinel.style.height = "1px";
            panel.parentNode.insertBefore(stickySentinel, panel);
          }

          if (!stickyIO){
            stickyIO = new IntersectionObserver(
              ([entry]) => {
                panel.classList.toggle("is-stuck", !entry.isIntersecting);
              },
              { root: scroller, threshold: [1] }
            );
          }
        }

        initStickyStuckClass();

        setActiveView("Day");
        updateFloatingActions();
        forceResponsiveReflow();
      }catch(e){
        const msg = e.message || "Failed to load";
        toast("err", msg);
        showErrorOnActiveView("Day", msg, () => boot());
      }
    }

    boot();
  </script>
</body>
</html>
